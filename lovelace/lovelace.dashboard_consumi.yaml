config:
  views:
  - header:
      card:
        content: "CONSUMI \u2013 Gas"
        text_only: true
        type: markdown
    path: gas
    sections:
    - cards:
      - heading: 'Totale (solo mesi dove esistono tutti dati):'
        heading_style: subtitle
        type: heading
      - entity: input_number.gas_totale_rilevato_mc
        features_position: bottom
        grid_options:
          columns: 6
          rows: auto
        name: Totale rilevato
        type: tile
        vertical: false
      - entity: input_number.gas_totale_bollette_mc
        features_position: bottom
        grid_options:
          columns: 6
          rows: auto
        name: Totale bollette
        type: tile
        vertical: false
      - heading: 'Ultimo mese:'
        heading_style: subtitle
        type: heading
      - entity: sensor.gas_mese_mc
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        name: Gas mese
        type: tile
        vertical: false
      - entity: sensor.gas_mese_euro
        features_position: bottom
        grid_options:
          columns: 3
          rows: 1
        name: "Gas mese \u20AC"
        type: tile
        vertical: false
      - heading: 'Oggi:'
        heading_style: subtitle
        type: heading
      - entity: sensor.gas_oggi_mc
        features:
        - type: trend-graph
        features_position: bottom
        grid_options:
          columns: 3
          rows: 1
        name: Gas oggi
        type: tile
        vertical: false
      - entity: sensor.gas_oggi_euro
        features_position: bottom
        grid_options:
          columns: 3
          rows: 1
        name: "Gas oggi \u20AC"
        type: tile
        vertical: false
      - graph_span: 30d
        grid_options:
          columns: 12
          rows: auto
        header:
          show: true
          title: "Gas, m\xB3 e Euro/gg"
        series:
        - entity: sensor.gas_oggi_mc
          name: "m\xB3 oggi"
          statistics:
            period: day
            type: max
          type: column
          yaxis_id: mc
        - entity: sensor.gas_oggi_euro
          name: Euro oggi
          statistics:
            period: day
            type: max
          type: column
          yaxis_id: euro
        type: custom:apexcharts-card
        yaxis:
        - apex_config:
            title:
              text: "m\xB3"
          decimals: 2
          id: mc
        - apex_config:
            title:
              text: Euro
          decimals: 2
          id: euro
          opposite: true
      - chart_type: bar
        days_to_show: 365
        entities:
        - entity: sensor.gas_mese_mc
          name: "m\xB3 rilevato"
        - entity: input_number.bolletta_gas_mc
          name: "m\xB3 bolletta"
        grid_options:
          columns: 12
          rows: auto
        period: month
        stat_types:
        - max
        title: "Gas, m\xB3/mese"
        type: statistics-graph
      - chart_type: bar
        days_to_show: 365
        entities:
        - entity: sensor.gas_mese_euro
          name: "\u20AC rilevato"
        - entity: input_number.bolletta_gas_euro
          name: "\u20AC bolletta"
        grid_options:
          columns: 12
          rows: auto
        period: month
        stat_types:
        - max
        title: Gas, Euro/mese
        type: statistics-graph
      - chart_type: bar
        days_to_show: 730
        entities:
        - entity: sensor.gas_mese_mc
          name: "m\xB3 rilevato"
        - entity: input_number.bolletta_gas_mc
          name: "m\xB3 bolletta"
        grid_options:
          columns: 12
          rows: auto
        period: year
        stat_types:
        - max
        title: "Gas, m\xB3/anno"
        type: statistics-graph
      - entity: input_number.gas_prezzo_mc
        grid_options:
          columns: 6
          rows: 2
        name: "Prezzo a consumo (1 m\xB3)"
        type: entity
      - entity: input_number.gas_quota_fissa_mese
        grid_options:
          columns: 6
          rows: 2
        name: Quota fissa mensile
        type: entity
      type: grid
    title: Gas
    type: sections
  - header:
      card:
        content: "CONSUMI \u2013 Elettricit\xE0"
        text_only: true
        type: markdown
    path: elettricita
    sections:
    - cards:
      - heading: 'Totale (solo mesi dove esistono tutti dati):'
        heading_style: subtitle
        type: heading
      - entity: input_number.elettricita_totale_rilevato_kwh
        features_position: bottom
        grid_options:
          columns: 6
          rows: auto
        icon: mdi:solar-power
        name: Totale rilevato
        type: tile
        vertical: false
      - entity: input_number.elettricita_totale_bollette_kwh
        features_position: bottom
        grid_options:
          columns: 6
          rows: auto
        name: Totale bollette
        type: tile
        vertical: false
      - entity: sensor.solo_auto_contattore_energia_totale
        features_position: bottom
        grid_options:
          columns: 3
          rows: 1
        icon: mdi:flash-auto
        name: Auto totale
        type: tile
        vertical: false
      - entity: sensor.solo_sauna_contatore_energia_totale
        features_position: bottom
        grid_options:
          columns: 3
          rows: 1
        icon: mdi:spa-outline
        name: Sauna totale
        type: tile
        vertical: false
      - entity: sensor.panasonic_energia_consumata_acc_sensor
        features_position: bottom
        grid_options:
          columns: 3
          rows: 1
        icon: mdi:heat-pump
        name: Pompa totale
        type: tile
        vertical: false
      - entity: sensor.fancoil_totale
        features_position: bottom
        grid_options:
          columns: 3
          rows: 1
        icon: mdi:fan
        name: Fancoil totale
        type: tile
        vertical: false
      - entity: sensor.deumidificatori_totale
        features_position: bottom
        grid_options:
          columns: 3
          rows: 1
        icon: mdi:air-humidifier
        name: Deumidif. totale
        type: tile
        vertical: false
      - entity: sensor.lavatrice_totale
        features_position: bottom
        grid_options:
          columns: 3
          rows: 1
        icon: mdi:washing-machine
        name: Lavatrice totale
        type: tile
        vertical: false
      - content: '{% set d = state_attr(''sensor.pv_tabella_mensile'', ''mesi'') %}
          {%

          if d is none %} _Dati non disponibili_ {% else %} {% set mesi = d

          | reverse | list %} <div

          style="overflow-x:auto;overflow-y:auto;max-height:400px;font-size:11px">

          <table

          style="border-collapse:collapse;width:100%;white-space:nowrap">

          <thead><tr

          style="position:sticky;top:0;background:#1a1a2e;color:#e0e0e0">

          <th style="padding:4px 6px;border:1px solid #444">Mese</th> <th

          style="padding:4px 6px;border:1px solid #444">Prod</th> <th

          style="padding:4px 6px;border:1px solid #444">Consumo</th> <th

          style="padding:4px 6px;border:1px solid #444">% Consumo</th>

          <th style="padding:4px 6px;border:1px solid #444">Import</th> <th

          style="padding:4px 6px;border:1px solid #444">Tot Consum</th> <th

          style="padding:4px 6px;border:1px solid #444">Export</th> <th

          style="padding:4px 6px;border:1px solid #444">Bat Carica</th> <th

          style="padding:4px 6px;border:1px solid #444">Bat Scarica</th> <th

          style="padding:4px 6px;border:1px solid #444">%Perd</th>

          </tr></thead> <tbody> {% for r in mesi %} {% if loop.first or

          loop.last %} <tr style="font-weight:bold;background:#2a2a3e"> {%

          else %} <tr> {% endif %} <td style="padding:3px 6px;border:1px

          solid #333">{{ r.mese }}</td> <td style="padding:3px

          6px;border:1px solid #333;text-align:right">{{ r.produzione

          }}</td> <td style="padding:3px 6px;border:1px solid

          #333;text-align:right">{{ r.autoconsumo }}</td> <td

          style="padding:3px 6px;border:1px solid #333;text-align:right">{{

          r.pct_auto }}%</td> <td style="padding:3px 6px;border:1px solid

          #333;text-align:right">{{ r.import }}</td> <td style="padding:3px

          6px;border:1px solid #333;text-align:right">{{ r.consumo_tot

          }}</td> <td style="padding:3px 6px;border:1px solid

          #333;text-align:right">{{ r.export }}</td> <td style="padding:3px

          6px;border:1px solid #333;text-align:right">{{ r.batt_carica

          }}</td> <td style="padding:3px 6px;border:1px solid

          #333;text-align:right">{{ r.batt_scarica }}</td> <td

          style="padding:3px 6px;border:1px solid #333;text-align:right">{{

          r.pct_batt_loss }}%</td> </tr> {% endfor %} </tbody></table></div>

          {% endif %}

          '
        grid_options:
          columns: full
          rows: auto
        type: markdown
      - heading: '30gg e dati di oggi sotto ogni grafico '
        heading_style: subtitle
        type: heading
      - graph_span: 30d
        grid_options:
          columns: 12
          rows: auto
        header:
          show: true
          title: Da rete, kWh e Euro/gg
        series:
        - entity: sensor.elettricita_oggi_kwh
          name: Da rete oggi
          statistics:
            period: day
            type: max
          type: column
          yaxis_id: kwh
        - entity: sensor.elettricita_oggi_euro
          name: Da rete oggi
          statistics:
            period: day
            type: max
          type: column
          yaxis_id: euro
        type: custom:apexcharts-card
        yaxis:
        - apex_config:
            title:
              text: kWh
          decimals: 1
          id: kwh
        - apex_config:
            title:
              text: Euro
          decimals: 2
          id: euro
          opposite: true
      - graph_span: 30d
        grid_options:
          columns: 12
          rows: auto
        header:
          show: true
          title: Produzione e a rete, kWh/gg
        series:
        - entity: sensor.inverter_uflex_today_production
          name: production oggi
          statistics:
            period: day
            type: state
          type: column
          yaxis_id: kwh
        - entity: sensor.inverter_uflex_today_energy_export
          name: a rete oggi
          statistics:
            period: day
            type: state
          type: column
          yaxis_id: kwh
        type: custom:apexcharts-card
        yaxis:
        - apex_config:
            title:
              text: kWh
          decimals: 1
          id: kwh
        - apex_config:
            title:
              text: kwh
          decimals: 1
          id: jwh
          opposite: true
        - apex_config:
            title:
              text: kwh
          decimals: 1
          id: kwh
          opposite: true
      - graph_span: 30d
        grid_options:
          columns: 12
          rows: auto
        header:
          show: true
          title: Tutti apparecchi, kWh/gg
        series:
        - entity: sensor.panasonic_consumata_oggi
          name: Pompa
          statistics:
            period: day
            type: state
          type: column
          yaxis_id: kwh
        - entity: sensor.consumo_fancoil_totale_oggi
          name: Fancoil
          statistics:
            period: day
            type: state
          type: column
          yaxis_id: kwh
        - entity: sensor.consumo_deumidificatori_oggi
          name: Deumidif.
          statistics:
            period: day
            type: state
          type: column
          yaxis_id: kwh
        - entity: sensor.lavatricemielewci870_consumo_energia
          name: Lavatrice
          statistics:
            period: day
            type: state
          type: column
          yaxis_id: kwh
        - entity: sensor.auto_energia_oggi
          name: Auto
          statistics:
            period: day
            type: state
          type: column
          yaxis_id: kwh
        - entity: sensor.sauna_energia_oggi
          name: Sauna
          statistics:
            period: day
            type: state
          type: column
          yaxis_id: kwh
        type: custom:apexcharts-card
        yaxis:
        - apex_config:
            title:
              text: kWh
          decimals: 1
          id: kwh
        - apex_config:
            title:
              text: kwh
          decimals: 1
          id: jwh
          opposite: true
        - apex_config:
            title:
              text: kwh
          decimals: 1
          id: kwh
          opposite: true
      - heading: 'Ultimo mese:'
        heading_style: subtitle
        type: heading
      - entity: sensor.produzione_mese
        features_position: bottom
        grid_options:
          columns: 4
          rows: 1
        icon: mdi:solar-power
        name: Produz. mese
        type: tile
        vertical: false
      - entity: sensor.a_rete_mese
        features_position: bottom
        grid_options:
          columns: 3
          rows: 1
        icon: mdi:transmission-tower-export
        name: A rete mese
        type: tile
        vertical: false
      - entity: sensor.elettricita_mese_kwh
        features_position: bottom
        grid_options:
          columns: 3
          rows: 1
        icon: mdi:transmission-tower-import
        name: Da rete mese
        type: tile
        vertical: false
      - entity: sensor.elettricita_mese_euro
        features_position: bottom
        grid_options:
          columns: 3
          rows: 1
        name: Da rete mese
        type: tile
        vertical: false
      - entity: sensor.panasonic_consumata_mese
        features_position: bottom
        grid_options:
          columns: 3
          rows: 1
        name: Pompa mese
        type: tile
        vertical: false
      - entity: sensor.fancoil_mese
        features_position: bottom
        grid_options:
          columns: 3
          rows: 1
        icon: mdi:fan
        name: Fancoil mese
        type: tile
        vertical: false
      - entity: sensor.deumidificatori_mese
        features_position: bottom
        grid_options:
          columns: 3
          rows: 1
        icon: mdi:air-humidifier
        name: Deumidif. mese
        type: tile
        vertical: false
      - entity: sensor.lavatrice_mese
        features_position: bottom
        grid_options:
          columns: 3
          rows: 1
        icon: mdi:washing-machine
        name: Lavatrice mese
        type: tile
        vertical: false
      - entity: sensor.auto_energia_mese
        features_position: bottom
        grid_options:
          columns: 3
          rows: 1
        icon: mdi:flash-auto
        name: Auto mese
        type: tile
        vertical: false
      - entity: sensor.sauna_energia_mese
        features_position: bottom
        grid_options:
          columns: 3
          rows: 1
        icon: mdi:spa-outline
        name: Sauna mese
        type: tile
        vertical: false
      - heading: 'Risparmio fotovoltaico (storico):'
        heading_style: subtitle
        type: heading
      - entity: input_number.pv_risparmio_euro
        features_position: bottom
        grid_options:
          columns: 4
          rows: 1
        icon: mdi:solar-power
        name: Autoconsumo
        type: tile
        vertical: false
      - entity: input_number.pv_gse_euro
        features_position: bottom
        grid_options:
          columns: 4
          rows: 1
        icon: mdi:cash-multiple
        name: Da GSE
        type: tile
        vertical: false
      - entity: input_number.pv_totale_euro
        features_position: bottom
        grid_options:
          columns: 4
          rows: 1
        icon: mdi:piggy-bank
        name: Totale
        type: tile
        vertical: false
      - entity: input_number.pv_recupero_pct
        features_position: bottom
        grid_options:
          columns: 4
          rows: 1
        icon: mdi:percent
        name: '% recupero'
        type: tile
        vertical: false
      - entity: input_number.elettricita_prezzo_kwh
        grid_options:
          columns: 12
          rows: 2
        name: Prezzo a consumo (1 kWh)
        type: entity
      - entity: input_number.elettricita_quota_fissa_mese
        grid_options:
          columns: 12
          rows: 2
        name: Quota fissa mensile
        type: entity
      type: grid
    - cards:
      - heading: Ultimi 12 mesi
        heading_style: title
        type: heading
      - chart_type: bar
        days_to_show: 365
        entities:
        - entity: sensor.elettricita_mese_kwh
          name: kWh rilevato
        - entity: input_number.bolletta_elec_kwh
          name: kWh bolletta
        grid_options:
          columns: 12
          rows: auto
        period: month
        stat_types:
        - max
        title: Da rete, kWh/mese
        type: statistics-graph
      - chart_type: bar
        days_to_show: 365
        entities:
        - entity: sensor.elettricita_mese_euro
          name: "\u20AC rilevato"
        - entity: input_number.bolletta_elec_euro
          name: "\u20AC bolletta"
        grid_options:
          columns: 12
          rows: auto
        period: month
        stat_types:
        - max
        title: "Da rete, \u20AC/mese"
        type: statistics-graph
      - graph_span: 120d
        grid_options:
          columns: 12
          rows: auto
        header:
          show: true
          title: Tutti apparecchi, kWh/mese
        series:
        - entity: sensor.panasonic_consumata_oggi
          name: Pompa
          statistics:
            period: month
            type: change
          type: column
          yaxis_id: kwh
        - entity: sensor.consumo_fancoil_totale_oggi
          name: Fancoil
          statistics:
            period: month
            type: change
          type: column
          yaxis_id: kwh
        - entity: sensor.consumo_deumidificatori_oggi
          name: Deumidif.
          statistics:
            period: month
            type: change
          type: column
          yaxis_id: kwh
        - entity: sensor.lavatricemielewci870_consumo_energia
          name: Lavatrice
          statistics:
            period: month
            type: change
          type: column
          yaxis_id: kwh
        - entity: sensor.auto_energia_oggi
          name: Auto
          statistics:
            period: month
            type: change
          type: column
          yaxis_id: kwh
        - entity: sensor.sauna_energia_oggi
          name: Sauna
          statistics:
            period: month
            type: change
          type: column
          yaxis_id: kwh
        type: custom:apexcharts-card
        yaxis:
        - apex_config:
            title:
              text: kWh
          decimals: 1
          id: kwh
        - apex_config:
            title:
              text: kwh
          decimals: 1
          id: jwh
          opposite: true
        - apex_config:
            title:
              text: kwh
          decimals: 1
          id: kwh
          opposite: true
      - chart_type: bar
        days_to_show: 365
        entities:
        - entity: sensor.a_rete_mese_euro
          name: "Stimato (kWh \xD7 tariffa)"
        - entity: input_number.bolletta_gse_euro
          name: Pagato GSE
        grid_options:
          columns: 12
          rows: auto
        period: month
        stat_types:
        - max
        title: "A rete stimato-GSE,\u20AC"
        type: statistics-graph
      - chart_type: bar
        days_to_show: 365
        entities:
        - entity: sensor.gse_prezzo_kwh
          name: "\u20AC/kWh GSE"
        grid_options:
          columns: 12
          rows: auto
        period: month
        stat_types:
        - max
        title: "Prezzo GSE \u20AC/kWh"
        type: statistics-graph
      type: grid
    - cards:
      - heading: Anni
        heading_style: title
        type: heading
      - chart_type: bar
        days_to_show: 730
        entities:
        - entity: sensor.elettricita_mese_kwh
          name: kWh rilevato
        - entity: input_number.bolletta_elec_kwh
          name: kWh bolletta
        grid_options:
          columns: 12
          rows: auto
        period: year
        stat_types:
        - max
        title: Da rete, kWh/anno
        type: statistics-graph
      - chart_type: bar
        days_to_show: 730
        entities:
        - entity: sensor.panasonic_consumata_oggi
          name: Pompa
        - entity: sensor.consumo_fancoil_totale_oggi
          name: Fancoil
        - entity: sensor.consumo_deumidificatori_oggi
          name: Deumidif.
        - entity: sensor.lavatricemielewci870_consumo_energia
          name: Lavatrice
        - entity: sensor.auto_energia_oggi
          name: Auto
        - entity: sensor.sauna_energia_oggi
          name: Sauna
        grid_options:
          columns: 12
          rows: auto
        period: year
        stat_types:
        - change
        type: statistics-graph
      type: grid
    title: "Elettricit\xE0"
    type: sections
  - header:
      card:
        content: "CONSUMI \u2013 Acqua"
        text_only: true
        type: markdown
    path: acqua
    sections:
    - cards:
      - heading: 'Totale (solo mesi dove esistono tutti dati):'
        heading_style: title
        type: heading
      - entity: input_number.acqua_totale_rilevato_mc
        features_position: bottom
        grid_options:
          columns: 6
          rows: auto
        name: Totale rilevato
        type: tile
        vertical: false
      - entity: input_number.acqua_totale_bollette_mc
        features_position: bottom
        grid_options:
          columns: 6
          rows: auto
        name: Totale bollette
        type: tile
        vertical: false
      - heading: 'Oggi:'
        heading_style: title
        type: heading
      - entity: sensor.acqua_oggi_mc
        features_position: bottom
        grid_options:
          columns: 3
          rows: 1
        name: Totale
        type: tile
        vertical: false
      - entity: sensor.acqua_oggi_euro
        features_position: bottom
        grid_options:
          columns: 3
          rows: 1
        name: Totale
        type: tile
        vertical: false
      - entity: sensor.acqua_sanitaria_totale
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        name: Fredda
        type: tile
        vertical: false
      - entity: sensor.acqua_sanitaria_calda_stimata
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        name: Calda
        type: tile
        vertical: false
      - entity: sensor.acqua_irrigazione_oggi
        features_position: bottom
        grid_options:
          columns: 3
          rows: 1
        name: Irrigazioni
        type: tile
        vertical: false
      - entity: sensor.acqua_lavatrice_oggi
        features_position: bottom
        grid_options:
          columns: 3
          rows: 1
        icon: mdi:washing-machine
        name: Lavatrice oggi
        type: tile
        vertical: false
      - graph_span: 30d
        grid_options:
          columns: 12
          rows: auto
        header:
          show: true
          title: "Acqua, m\xB3 e Euro/gg"
        series:
        - entity: sensor.acqua_oggi_mc
          name: "m\xB3 oggi"
          statistics:
            period: day
            type: max
          type: column
          yaxis_id: mc
        - entity: sensor.acqua_oggi_euro
          name: Euro oggi
          statistics:
            period: day
            type: max
          type: column
          yaxis_id: euro
        type: custom:apexcharts-card
        yaxis:
        - apex_config:
            title:
              text: "m\xB3"
          decimals: 3
          id: mc
        - apex_config:
            title:
              text: Euro
          decimals: 2
          id: euro
          opposite: true
      - heading: Solo Irrigazione oggi
        heading_style: subtitle
        type: heading
      - entity: counter.irrigazione_minuti_oggi
        features_position: bottom
        grid_options:
          columns: 3
          rows: 1
        name: Minuti oggi
        type: tile
        vertical: false
      - entity: sensor.acqua_irrigazione_oggi
        features_position: bottom
        grid_options:
