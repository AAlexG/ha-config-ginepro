config:
  views:
  - cards: []
    max_columns: 2
    path: tende
    sections:
    - cards:
      - heading: Pergola Terrazza
        heading_style: title
        icon: mdi:awning-outline
        type: heading
      - entity: cover.terrazzo_pergola_terrazza
        features:
        - type: cover-open-close
        - type: cover-position
        features_position: bottom
        grid_options:
          columns: 6
          rows: auto
        name: Stato apertura
        type: tile
        vertical: false
      - entity: input_boolean.pergola_blocco_manuale
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        name: Chiudere fino notte
        tap_action:
          action: perform-action
          perform_action: script.pergola_toggle_manuale
        type: tile
        vertical: false
      - entity: input_boolean.pergola_meteo_chiusura
        features_position: bottom
        grid_options:
          columns: full
          rows: 1
        name: E' stata chiusa X meteo oggi
        type: tile
        vertical: false
      type: grid
    - cards:
      - heading: Tenda Giardino
        heading_style: title
        icon: mdi:roman-shade
        type: heading
      - entity: cover.all_house_tenda_terrazzo
        features:
        - type: cover-open-close
        features_position: bottom
        grid_options:
          columns: 12
          rows: 1
        name: Tenda Giardino
        type: tile
        vertical: false
      - entity: input_boolean.tenda_notifica_vento_oggi
        grid_options:
          columns: 12
          rows: 1
        name: E' stata chiusa x raffiche oggi
        type: tile
        vertical: false
      type: grid
    title: Tende
    type: sections
