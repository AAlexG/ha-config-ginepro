config:
  views:
  - cards: []
    max_columns: 2
    path: tende
    sections:
    - cards:
      - heading: Pergola Terrazza
        heading_style: title
        icon: mdi:awning-outline
        type: heading
      - heading: Blocca inseguimento solare e sicurezza meteo fino cambio giorno/notte
          (07:00 / 23:00)
        heading_style: subtitle
        icon: ''
        type: heading
      - entity: cover.terrazzo_pergola_terrazza
        features:
        - type: cover-open-close
        - type: cover-position
        features_position: bottom
        grid_options:
          columns: 12
          rows: 2
        name: Pergola Terrazza
        type: tile
        vertical: false
      - entity: input_boolean.pergola_blocco_manuale
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        name: Pergola Manuale
        tap_action:
          action: perform-action
          perform_action: script.pergola_toggle_manuale
        type: tile
        vertical: false
      - entity: input_boolean.pergola_meteo_chiusura
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        name: Chiusura Meteo Attiva
        type: tile
        vertical: false
      type: grid
    - cards:
      - heading: Tenda Giardino
        heading_style: title
        icon: mdi:roman-shade
        type: heading
      - heading: Solo controllo manuale - nessun inseguimento automatico. Chiusura
          automatica solo per raffiche vento > 40 km/h
        heading_style: subtitle
        icon: ''
        type: heading
      - entity: cover.all_house_tenda_terrazzo
        features:
        - type: cover-open-close
        features_position: bottom
        grid_options:
          columns: 12
          rows: 1
        name: Tenda Giardino
        type: tile
        vertical: false
      type: grid
    title: Tende
    type: sections
