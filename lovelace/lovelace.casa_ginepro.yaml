          pv2_voltage_111: sensor.inverter_uflex_pv2_voltage
          pv_total_power: sensor.inverter_uflex_pv_power
        grid:
          show_daily_buy: true
          show_daily_sell: true
          show_nonessential: true
        inverter:
          autarky: power
          auto_scale: true
          colour: '#9e9e9e'
          model: sunsynk
          modern: true
          three_phase: false
        large_font: false
        load:
          show_daily: true
        max_line_width: 4
        min_line_width: 1
        show_battery: true
        show_grid: true
        show_solar: true
        solar:
          mppts: 2
          show_daily: true
        type: custom:sunsynk-power-flow-card
