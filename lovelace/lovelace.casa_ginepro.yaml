config:
  views:
  - max_columns: 2
    path: home
    sections:
    - cards:
      - heading: APRI CANCELLI & ALARMI
        heading_style: title
        icon: mdi:security
        type: heading
      - grid_options:
          columns: 2
          rows: auto
        icon: mdi:gate-arrow-right
        name: Canc ello
        show_icon: true
        show_name: true
        show_state: false
        tap_action:
          action: perform-action
          perform_action: script.apri_cancello_casa
        type: button
      - grid_options:
          columns: 2
          rows: auto
        icon: mdi:boom-gate-up
        name: Moto
        show_icon: true
        show_name: true
        show_state: false
        tap_action:
          action: perform-action
          perform_action: button.press
          target:
            entity_id: button.10007c3b31_0
        type: button
      - grid_options:
          columns: 2
          rows: auto
        icon: mdi:garage-open
        name: Box
        show_state: false
        tap_action:
          action: perform-action
          perform_action: script.apri_box_combo
        type: button
      - grid_options:
          columns: 3
          rows: auto
        icon: mdi:garage
        name: Portone Box
        show_state: false
        tap_action:
          action: perform-action
          perform_action: button.press
          target:
            entity_id: button.portone_telecomando
        type: button
      - grid_options:
          columns: 3
          rows: auto
        icon: mdi:gate
        name: Grande Cancello
        show_state: false
        tap_action:
          action: perform-action
          perform_action: script.apri_grande_cancello
        type: button
      - cards:
        - icon: mdi:alarm-light
          name: Sirena ON
          tap_action:
            action: perform-action
            perform_action: script.sirena_on
          type: button
        - icon: mdi:volume-high
          name: Speaker ON
          show_icon: true
          show_name: true
          tap_action:
            action: perform-action
            perform_action: script.speaker_allarme
          type: button
        - icon: mdi:alarm-light-off
          name: Tutto OFF
          tap_action:
            action: perform-action
            perform_action: script.sirena_off
          type: button
        columns: 3
        grid_options:
          columns: 9
          rows: 2
        square: false
        type: grid
      - heading: SCORCIATOIE
        heading_style: subtitle
        icon: mdi:water
        type: heading
      - grid_options:
          columns: 3
          rows: auto
        icon: mdi:camera
        icon_height: 20px
        name: Sicu rezza
        show_icon: true
        show_name: true
        show_state: false
        tap_action:
          action: navigate
          navigation_path: /dashboard-sicurezza/sicurezza
        type: button
      - grid_options:
          columns: 3
          rows: auto
        icon: mdi:solar-power-variant-outline
        icon_height: 20px
        name: Foto voltaico
        show_icon: true
        show_name: true
        show_state: false
        tap_action:
          action: navigate
          navigation_path: /dashboard-fotovoltaico/fotovoltaico
        type: button
      - grid_options:
          columns: 3
          rows: auto
        icon: mdi:heat-pump
        icon_height: 20px
        name: Pompa
        show_icon: true
        show_name: true
        show_state: false
        tap_action:
          action: navigate
          navigation_path: /dashboard-panasonic/panasonic
        type: button
      - grid_options:
          columns: 3
          rows: auto
        icon: mdi:thermostat-box
        icon_height: 20px
        name: Caldaia
        show_icon: true
        show_name: true
        show_state: false
        tap_action:
          action: navigate
          navigation_path: /otgw-caldaia/otgw
        type: button
      - grid_options:
          columns: 3
          rows: auto
        icon: mdi:weather-partly-cloudy
        icon_height: 20px
        name: Fancoil Deum
        show_icon: true
        show_name: true
        show_state: false
        tap_action:
          action: navigate
          navigation_path: /dashboard-fancoil/fancoil
        type: button
      - grid_options:
          columns: 3
          rows: auto
        icon: mdi:train-car-hopper-covered
        icon_height: 20px
        name: Tende
        show_icon: true
        show_name: true
        show_state: false
        tap_action:
          action: navigate
          navigation_path: /dashboard-tende/tende
        type: button
      - grid_options:
          columns: 3
          rows: auto
        icon: mdi:heat-pump
        icon_height: 20px
        name: Clima
        show_icon: true
        show_name: true
        show_state: false
        tap_action:
          action: navigate
          navigation_path: /dashboard-clima/clima
        type: button
      - grid_options:
          columns: 3
          rows: auto
        icon: mdi:home
        icon_height: 20px
        name: Zone
        show_icon: true
        show_name: true
        show_state: false
        tap_action:
          action: navigate
          navigation_path: /zone-casa
        type: button
      - grid_options:
          columns: 3
          rows: auto
        icon: mdi:file-table
        icon_height: 20px
        name: Consumi
        show_icon: true
        show_name: true
        show_state: false
        tap_action:
          action: navigate
          navigation_path: /dashboard-consumi/gas
        type: button
      - grid_options:
          columns: 3
          rows: auto
        icon: mdi:weather-partly-cloudy
        icon_height: 20px
        name: Meteo
        show_icon: true
        show_name: true
        show_state: false
        tap_action:
          action: navigate
          navigation_path: /dashboard-meteo/meteo
        type: button
      - grid_options:
          columns: 6
          rows: auto
        icon: mdi:solar-panel-large
        icon_height: 20px
        name: Panel Analytics
        show_icon: true
        show_name: true
        show_state: false
        tap_action:
          action: perform-action
          data:
            data:
              package_name: appinventor.ai_aagorine.PanelAnalytics
            message: command_launch_app
          perform_action: notify.mobile_app_cph2653
        type: button
      - entity: sensor.opentherm_gateway_otgw_otgw_boiler_exhaust_temperature
        features_position: bottom
        grid_options:
          columns: 3
          rows: 1
        icon_tap_action:
          action: navigate
          navigation_path: /otgw-caldaia/otgw
        name: OUT caldaia
        type: tile
        vertical: false
      - entity: sensor.panasonic_heat_pump_main_main_outlet_temp
        features_position: bottom
        grid_options:
          columns: 4
          rows: 1
        icon_tap_action:
          action: navigate
          navigation_path: /dashboard-panasonic/panasonic
        name: OUT pompa
        type: tile
        vertical: false
      - entity: switch.panasonic_heat_pump_main_heatpump_state
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        name: Pompa
        tap_action:
          action: none
        type: tile
        vertical: false
      - grid_options:
          columns: 6
        icon: mdi:heat-pump
        icon_height: 20px
        name: Pompa ON/OFF
        show_icon: true
        show_name: true
        show_state: false
        tap_action:
          action: perform-action
          perform_action: script.panasonic_toggle
        type: button
      - entity: binary_sensor.panasonic_heat_pump_lwt
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        name: Pompa Online
        type: tile
        vertical: false
      - entity: binary_sensor.opentherm_gateway_otgw_otgw_flame
        features_position: bottom
        grid_options:
          columns: 3
          rows: 1
        icon_tap_action:
          action: navigate
          navigation_path: /otgw-caldaia/otgw
        name: Caldaia Fiamma
        type: tile
        vertical: false
      - color: blue
        entity: sensor.irrigazione_attiva
        features_position: bottom
        grid_options:
          columns: 4
          rows: 1
        name: ON/OFF Irrigazione
        tap_action:
          action: perform-action
          perform_action: script.irrigazione_salta_toggle
        type: tile
        vertical: false
      - entity: switch.solo_auto_contattore_interruttore
        features:
        - type: toggle
        features_position: bottom
        name: Auto contattore
        type: tile
        vertical: false
      - card:
          grid_options:
            columns: 3
            rows: 1
          icon: mdi:radiator
          name: Caldaia ON
          tap_action:
            action: perform-action
            data:
              hvac_mode: heat
            perform_action: climate.set_hvac_mode
            target:
              entity_id: climate.smart_autotune_thermostat_living_room
          type: button
        conditions:
        - condition: state
          entity: climate.smart_autotune_thermostat_living_room
          state: 'off'
        grid_options:
          columns: 3
          rows: auto
        type: conditional
      - card:
          grid_options:
            columns: 3
            rows: 1
          icon: mdi:radiator-off
          name: Caldaia OFF
          tap_action:
            action: perform-action
            data:
              hvac_mode: 'off'
            perform_action: climate.set_hvac_mode
            target:
              entity_id: climate.smart_autotune_thermostat_living_room
          type: button
        conditions:
        - condition: state
          entity: climate.smart_autotune_thermostat_living_room
          state: heat
        grid_options:
          columns: 3
          rows: auto
        type: conditional
      - card:
          grid_options:
            columns: 3
            rows: 1
          icon: mdi:water-boiler-off
          name: Sanitaria OFF
          tap_action:
            action: perform-action
            perform_action: script.caldaia_dhw_off
          type: button
        conditions:
        - condition: state
          entity: input_boolean.caldaia_dhw_override
          state: 'on'
        grid_options:
          columns: 3
          rows: auto
        type: conditional
      - card:
          grid_options:
            columns: 3
            rows: 1
          icon: mdi:water-boiler
          name: Sanitaria ON
          tap_action:
            action: perform-action
            perform_action: script.caldaia_dhw_on
          type: button
        conditions:
        - condition: state
          entity: input_boolean.caldaia_dhw_override
          state: 'off'
        grid_options:
          columns: 3
          rows: auto
        type: conditional
      type: grid
    - cards:
      - heading: MUSICA
        heading_style: title
        icon: mdi:music
        type: heading
      - entity: media_player.googlehome8851
        features:
        - step: 5
          type: media-player-volume-buttons
        features_position: bottom
        grid_options:
          rows: auto
        name: Yamaha Volume
        type: tile
        vertical: false
      - content: "{% set st = states('media_player.googlehome8851') %} {% set t =\
          \ state_attr('media_player.googlehome8851', 'media_title') %} {% set a =\
          \ state_attr('media_player.googlehome8851', 'media_artist') %} {% if t %}\U0001F3B5\
          \ **{{ t }}**{% if a %}  \\n\U0001F464 {{ a }}{% endif %}{% elif st == 'playing'\
          \ %}\U0001F426 _Canto degli uccelli_{% else %}\u23F9\uFE0F _Niente in riproduzione_{%\
          \ endif %}"
        grid_options:
          columns: 6
          rows: auto
        type: markdown
      - entity: media_player.salotto
        features:
        - step: 5
          type: media-player-volume-buttons
        features_position: bottom
        grid_options:
          rows: auto
        name: Salotto Volume
        type: tile
        vertical: false
      - grid_options:
          columns: 3
          rows: auto
        icon: mdi:bird
        icon_height: 20px
        name: Uccelli
        show_icon: true
        show_name: true
        show_state: false
        tap_action:
          action: perform-action
          perform_action: script.riaggancia_yamaha
        type: button
      - grid_options:
          columns: 3
          rows: auto
        icon: mdi:spotify
        icon_height: 20px
        name: Spotify
        show_icon: true
        show_name: true
        show_state: false
        tap_action:
          action: perform-action
          data:
            data:
              package_name: com.spotify.music
            message: command_launch_app
          perform_action: notify.mobile_app_cph2653
        type: button
      type: grid
    - cards:
      - heading: TEMPERATURE ATTUALI E DESIDERATE
        heading_style: title
        type: heading
      - entities:
        - entity: sensor.hp1000se_pro_pro_v1_6_4_indoor_temperature
          name: Sala
        - entity: sensor.sonoff_10008d119d_temperature
          name: Georgi
        - entity: sensor.termometro_tania_zigbee_temperature
          name: Tania
        - entity: sensor.panasonic_heat_pump_main_outside_temp
          name: Esterna
        - entity: sensor.panasonic_heat_pump_main_main_outlet_temp
          name: Pompa Out
        - entity: sensor.opentherm_gateway_otgw_otgw_boiler_flow_water_temperature
          name: Caldaia OUT
        grid_options:
          columns: full
          rows: auto
        hours_to_show: 24
        refresh_interval: 60
        type: history-graph
      - content: "{% set mod = states('input_select.clima_modalita') %} {% set stagione\
          \ = states('input_select.clima_stagione') %} {% if stagione == 'estate'\
          \ %}\n  {% if mod == 'notte' %}\n    **Sala max disiderata:** {{ states('input_number.maxtemp_notte_estate_sala')\
          \ }}\xB0C\n    **Georgi max disiderata:** {{ states('input_number.maxtemp_notte_estate_letto')\
          \ }}\xB0C\n  {% else %}\n    **Sala max disiderata:** {{ states('input_number.maxtemp_giorno_estate_sala')\
          \ }}\xB0C\n    **Georgi max disiderata:** {{ states('input_number.maxtemp_giorno_estate_letto')\
          \ }}\xB0C\n  {% endif %}\n{% else %}\n  {% if mod == 'notte' %}\n    **Sala\
          \ min disiderata:** {{ states('input_number.mintemp_notte_inverno_sala')\
          \ }}\xB0C\n    **Georgi min disiderata:** {{ states('input_number.mintemp_notte_inverno_letto')\
          \ }}\xB0C\n  {% else %}\n    **Sala min disiderata:** {{ states('input_number.mintemp_giorno_inverno_sala')\
          \ }}\xB0C\n    **Georgi min disiderata:** {{ states('input_number.mintemp_giorno_inverno_letto')\
          \ }}\xB0C\n  {% endif %}\n{% endif %} &nbsp;&nbsp; *({{ stagione }} / {{\
          \ mod }})*\n"
        grid_options:
          columns: 9
          rows: auto
        type: markdown
      - grid_options:
          columns: 3
          rows: auto
        icon: mdi:heat-pump
        icon_height: 20px
        name: Clima
        show_icon: true
        show_name: true
        show_state: false
        tap_action:
          action: navigate
          navigation_path: /dashboard-clima/clima
        type: button
      type: grid
