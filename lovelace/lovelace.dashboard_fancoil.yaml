        type: tile
        vertical: false
      - entity: sensor.deumidificatore_armadio_sonoff_sonoff_1002a68db0_power
        features:
        - type: trend-graph
        features_position: bottom
        name: Potenza
        type: tile
        vertical: false
      - entity: sensor.deumidificatore_armadio_sonoff_sonoff_1002a68db0_current
        features_position: bottom
        name: Corrente
        type: tile
        vertical: false
      - entity: sensor.presa_terrazza_tensione
        features_position: bottom
        name: Tensione
        type: tile
        vertical: false
      - chart_type: bar
        days_to_show: 7
        entities:
        - entity: sensor.deumidificatore_armadio_sonoff_sonoff_1002a68db0_energy_day
          name: 'Consumo giorno '
        period: day
        stat_types:
        - change
        type: statistics-graph
      - chart_type: bar
        days_to_show: 7
        entities:
        - entity: sensor.deumidificatore_armadio_sonoff_sonoff_1002a68db0_energy_day
