        - type: trend-graph
        features_position: bottom
        name: WiFi
        type: tile
        vertical: false
      - entity: sensor.shelly1g4_a085e3b4bee4_temperatura
        features:
        - type: trend-graph
        features_position: bottom
        name: 'Temp. Shelly '
        type: tile
        vertical: false
      - entity: sensor.shelly1g4_a085e3b4bee4_tempo_di_attivita
        features_position: bottom
        name: "Tempo attivit\xE0 "
        type: tile
        vertical: false
      type: grid
    - cards:
      - heading: 'Fancoil Tania shelly '
        heading_style: title
        type: heading
      - entity: switch.camerageorgi_shelly_fancoil_georgi
        features_position: bottom
        name: Stato
        type: tile
        vertical: false
      - entity: sensor.shelly1g4_a085e3b3f81c_intensita_del_segnale
        features:
        - type: trend-graph
        features_position: bottom
        name: WiFi
        type: tile
        vertical: false
      - entity: sensor.shelly1g4_a085e3b3f81c_temperatura
        features:
        - type: trend-graph
        features_position: bottom
        name: Temp. Shelly
        type: tile
        vertical: false
      - entity: sensor.shelly1g4_a085e3b3f81c_tempo_di_attivita
        features_position: bottom
        name: "Tempo attivit\xE0 "
        type: tile
        vertical: false
      type: grid
    - cards:
      - heading: Fancoil sala shelly
        heading_style: title
        type: heading
      - entity: switch.sala_fancoil_sala_shelly_1gen4
        features_position: bottom
        name: Stato
        type: tile
        vertical: false
      - entity: sensor.shelly1g4_a085e3ba36e0_intensita_del_segnale
        features:
        - type: trend-graph
        features_position: bottom
        name: WiFi
        type: tile
        vertical: false
      - entity: sensor.shelly1g4_a085e3ba36e0_temperatura
        features:
        - type: trend-graph
        features_position: bottom
        name: Temp. Shelly
        type: tile
        vertical: false
      - entity: sensor.shelly1g4_a085e3ba36e0_tempo_di_attivita
        features_position: bottom
        name: "Tempo attivit\xE0 "
        type: tile
        vertical: false
      type: grid
    - cards:
      - heading: Deumidificatore cantina presa
        heading_style: title
        type: heading
      - entity: switch.presa_deumidificatore_cantina
        features_position: bottom
        name: Stato
        type: tile
        vertical: false
      - entity: sensor.presa_terrazza_corrente
        features_position: bottom
        name: Corrente
        type: tile
        vertical: false
      - entity: sensor.presa_terrazza_potenza
        features:
        - type: trend-graph
        features_position: bottom
        name: Potenza
        type: tile
        vertical: false
      - entity: sensor.presa_terrazza_tensione
        features_position: bottom
        name: Tensione
        type: tile
        vertical: false
      - chart_type: bar
        days_to_show: 7
        entities:
        - entity: sensor.presa_terrazza_energia_totale
          name: Consumo giorno
        period: day
        stat_types:
        - change
        type: statistics-graph
      - chart_type: bar
        days_to_show: 7
        entities:
        - entity: sensor.presa_terrazza_energia_totale
          name: Consumo mese
        period: month
        stat_types:
        - change
        type: statistics-graph
      type: grid
    - cards:
      - heading: Deumidificatore armadio presa
        heading_style: title
        type: heading
      - entity: switch.deumidificatore_armadio_sonoff_sonoff_1002a68db0_1
        features_position: bottom
        name: Stato
        type: tile
        vertical: false
      - entity: sensor.deumidificatore_armadio_sonoff_sonoff_1002a68db0_rssi
