config:
  views:
  - cards: []
    max_columns: 2
    path: fancoil
    sections:
    - cards:
      - heading: Gestione Manuale
        heading_style: title
        icon: mdi:hand-back-right
        type: heading
      - heading: Blocca automatismi fino cambio giorno/notte (07:00 / 23:00)
        heading_style: subtitle
        icon: ''
        type: heading
      - heading: Fancoil
        heading_style: subtitle
        icon: ''
        type: heading
      - entity: switch.camerageorgi_shelly_fancoil_georgi
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        name: Tania ora
        type: tile
        vertical: false
      - entity: input_boolean.fancoil_georgi_manuale
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        name: ' Tania manuale'
        tap_action:
          action: perform-action
          perform_action: script.fancoil_georgi_toggle_manuale
        type: tile
        vertical: false
      - entity: switch.camerageorgi_shelly_fancoil_georgi_2
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        name: Georgi ora
        type: tile
        vertical: false
      - entity: input_boolean.fancoil_georgi2_manuale
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        name: Georgi manuale
        tap_action:
          action: perform-action
          perform_action: script.fancoil_georgi2_toggle_manuale
        type: tile
        vertical: false
      - entity: switch.sala_fancoil_sala_shelly_1gen4
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        name: Sala ora
        type: tile
        vertical: false
      - entity: input_boolean.fancoil_sala_manuale
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        name: Sala manuale
        tap_action:
          action: perform-action
          perform_action: script.fancoil_sala_toggle_manuale
        type: tile
        vertical: false
      - heading: Deumidificatori
        heading_style: subtitle
        icon: ''
        type: heading
      - entity: switch.presa_deumidificatore_cantina
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        name: Cantina ora
        type: tile
        vertical: false
      - entity: input_boolean.deumidificatore_cantina_manuale
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        name: Cantina Manuale
        tap_action:
          action: perform-action
          perform_action: script.deumidificatore_cantina_toggle_manuale
        type: tile
        vertical: false
      - entity: switch.deumidificatore_armadio_sonoff_sonoff_1002a68db0_1
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        name: Armadio ora
        type: tile
        vertical: false
      - entity: input_boolean.deumidificatore_armadio_manuale
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        name: Armadio Manuale
        tap_action:
          action: perform-action
          perform_action: script.deumidificatore_armadio_toggle_manuale
        type: tile
        vertical: false
      type: grid
    - cards:
      - heading: Consumo Energetico
        heading_style: title
        icon: mdi:lightning-bolt
        type: heading
      - heading: 'Fancoil: '
        heading_style: subtitle
        icon: ''
        type: heading
      - entity: sensor.consumo_fancoil_totale_oggi
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        hide_state: false
        name: Totale oggi
        show_entity_picture: false
        type: tile
        vertical: false
      - entity: sensor.consumo_fancoil_tania_oggi_stimato
        features_position: bottom
        grid_options:
          columns: 4
          rows: auto
        hide_state: false
        name: Tania oggi
        show_entity_picture: false
        type: tile
        vertical: false
      - entity: sensor.consumo_fancoil_georgi_oggi_stimato
        features_position: bottom
        grid_options:
          columns: 4
          rows: auto
        name: Georgi oggi
        type: tile
        vertical: false
      - entity: sensor.consumo_fancoil_sala_oggi_stimato_non_verificato
        features_position: bottom
        grid_options:
          columns: 4
          rows: auto
        name: Sala oggi
        type: tile
        vertical: false
      - chart_type: bar
        days_to_show: 30
        entities:
        - entity: sensor.consumo_fancoil_totale_oggi
          name: Totale
        - entity: sensor.consumo_fancoil_tania_oggi_stimato
          name: Tania
        - entity: sensor.consumo_fancoil_georgi_oggi_stimato
          name: Georgi
        - entity: sensor.consumo_fancoil_sala_oggi_stimato_non_verificato
          name: Sala
        grid_options:
          columns: full
          rows: auto
        period: day
        stat_types:
        - change
        type: statistics-graph
      - heading: Deumidificatori
        heading_style: subtitle
        icon: ''
        type: heading
      - entity: sensor.consumo_deumidificatori_oggi
        features_position: bottom
        grid_options:
          columns: 6
          rows: auto
        name: Totale oggi
        type: tile
        vertical: false
      - chart_type: bar
        days_to_show: 30
        entities:
        - entity: sensor.consumo_deumidificatori_oggi
          name: Totale deumidificatori
        grid_options:
          columns: full
          rows: auto
        period: day
        stat_types:
        - change
        type: statistics-graph
      type: grid
    - cards:
      - heading: 'Storico Accensioni:'
        heading_style: title
        icon: mdi:chart-timeline
        type: heading
      - heading: '-  Fancoil'
        heading_style: title
        icon: mdi:fan
        type: heading
      - entities:
        - entity: switch.camerageorgi_shelly_fancoil_georgi
          name: Tania
        - entity: switch.camerageorgi_shelly_fancoil_georgi_2
          name: Georgi
        - entity: switch.sala_fancoil_sala_shelly_1gen4
          name: Sala
        - entity: sensor.sonoff_10008d119d_temperature
          name: T Camera Georgi
        - entity: sensor.hp1000se_pro_pro_v1_6_4_indoor_temperature
          name: T Sala
        - entity: sensor.panasonic_heat_pump_main_main_outlet_temp
          name: T acqua Out pompa
        grid_options:
          columns: full
          rows: auto
        hours_to_show: 24
        refresh_interval: 60
        type: history-graph
      - entities:
        - entity: switch.camerageorgi_shelly_fancoil_georgi
          name: Tania
        - entity: switch.camerageorgi_shelly_fancoil_georgi_2
          name: Georgi
        - entity: switch.sala_fancoil_sala_shelly_1gen4
          name: Sala
        grid_options:
          columns: full
          rows: auto
        hours_to_show: 168
        refresh_interval: 300
        type: history-graph
      - heading: '-  Deumidificatori '
        heading_style: title
        icon: mdi:water
        type: heading
      - entities:
        - entity: switch.presa_deumidificatore_cantina
          name: Cantina
        - entity: switch.deumidificatore_armadio_sonoff_sonoff_1002a68db0_1
          name: Armadio
        grid_options:
          columns: full
          rows: auto
        hours_to_show: 168
        refresh_interval: 300
        type: history-graph
      - heading: (*) Deumidif. lavorono se Produzione>1000w
        heading_style: subtitle
        icon: ''
        type: heading
      - entities:
        - entity: sensor.inverter_uflex_pv_power
          name: Produzione panelli ora
        grid_options:
          columns: full
          rows: auto
        hours_to_show: 24
        refresh_interval: 60
        type: history-graph
      type: grid
    - cards:
      - heading: Fancoil georgi shelly
        heading_style: title
        type: heading
      - entity: switch.camerageorgi_shelly_fancoil_georgi_2
        features_position: bottom
        name: Stato
        type: tile
        vertical: false
      - entity: sensor.shelly1g4_a085e3b4bee4_intensita_del_segnale
