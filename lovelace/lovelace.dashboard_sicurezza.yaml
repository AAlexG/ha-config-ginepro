config:
  path: sicurezza
  views:
  - max_columns: 4
    path: meteo
    sections:
    - cards:
      - heading: Apperture Porte/Cancelli/Persiane
        heading_style: title
        type: heading
      - grid_options:
          columns: 2
          rows: auto
        icon: mdi:gate-arrow-right
        name: Canc ello
        show_icon: true
        show_name: true
        show_state: false
        tap_action:
          action: perform-action
          perform_action: script.apri_cancello_casa
        type: button
      - grid_options:
          columns: 2
          rows: auto
        icon: mdi:boom-gate-up
        name: Moto
        show_icon: true
        show_name: true
        show_state: false
        tap_action:
          action: perform-action
          perform_action: button.press
          target:
            entity_id: button.10007c3b31_0
        type: button
      - grid_options:
          columns: 2
          rows: auto
        icon: mdi:garage-open
        name: Box
        show_state: false
        tap_action:
          action: perform-action
          perform_action: script.apri_box_combo
        type: button
      - grid_options:
          columns: 3
          rows: auto
        icon: mdi:garage
        name: Portone Box
        show_state: false
        tap_action:
          action: perform-action
          perform_action: button.press
          target:
            entity_id: button.portone_telecomando
        type: button
      - grid_options:
          columns: 3
          rows: auto
        icon: mdi:gate
        name: Grande Cancello
        show_state: false
        tap_action:
          action: perform-action
          perform_action: script.apri_grande_cancello
        type: button
      - entity: binary_sensor.portone_box_stato
        features_position: bottom
        name: Portone box
        type: tile
        vertical: false
      - entity: binary_sensor.persiana_tania_sensore_zigbee_contact
