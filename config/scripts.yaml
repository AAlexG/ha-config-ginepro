#==================================================================================
# SCRIPT: SALVA BOLLETTA
# Chiama shell_command.salva_bolletta (Python -> SQLite) e restituisce
# il risultato come JSON su stdout. Nessun prezzo viene più scritto qui
# (scripts_40): i prezzi medi restano solo nel log Python come dato di
# controllo. I prezzi A CONSUMO sono gestiti altrove:
#   input_number.elettricita_prezzo_kwh -> automatico dal PUN
#     (automations_prezzo, sensor.elettricita_prezzo_kwh_variabile)
#   input_number.gas_prezzo_mc          -> manuale da bolletta
#     (Corrispettivo Gas Index + contributo + rete + accise, IVA inclusa)
# Le quote fisse mensili sono in input_number.*_quota_fissa_mese (manuali).
#==================================================================================
salva_bolletta:
  alias: "Bollette – Salva nel DB"
  mode: single
  sequence:
    - action: shell_command.salva_bolletta
      response_variable: risultato
    - variables:
        dati: "{{ risultato.stdout | from_json }}"
    - if:
        - condition: template
          value_template: "{{ dati.ok }}"
      then:
        # NUOVO (scripts_41): aggiorna il prezzo GSE stimato con
        # l'ultimo mese calcolato da salva_bolletta_9 (se disponibile).
        - if:
            - condition: template
              value_template: "{{ (dati.gse_prezzo_ultimo | default(0) | float(0)) > 0 }}"
          then:
            - action: input_number.set_value
              target:
                entity_id: input_number.gse_prezzo_kwh_stima
              data:
                value: "{{ dati.gse_prezzo_ultimo | float(0) | round(4) }}"
        - action: notify.mobile_app_cph2653
          data:
            title: "💾 Bolletta salvata"
            message: >
              Dati salvati per {{ states('input_select.bolletta_mese_sel') }}.
              Salvataggio completato.
              Dettagli in /config/bolletta_log.txt
      else:
        - action: notify.mobile_app_cph2653
          data:
            title: "⚠️ Errore salvataggio bolletta"
            message: >-
              {{ dati.errore | default('errore sconosciuto') }} – vedi /config/bolletta_log.txt

#==================================================================================
# SCRIPT: IRRIGAZIONE – ESEGUI SEQUENZA C1 -> C2 -> C3
# Accende in sequenza i tre canali per le durate T1/T2/T3 (turn_off esplicito tra
# un canale e l'altro). Chiamato dal ciclo programmato (dopo il gate meteo) e da "Cicla ora".
#==================================================================================
irrigazione_esegui_sequenza:
  alias: "Irrigazione – Esegui sequenza C1→C2→C3"
  mode: single
  sequence:
    - action: switch.turn_on
      target:
        entity_id: switch.irrigazione_sonoff_switch_4chpror3_sonoff_10028b1d36_1
    - delay:
        minutes: "{{ states('input_number.irrigazione_durata_c1') | int(0) }}"
    - action: switch.turn_off
      target:
        entity_id: switch.irrigazione_sonoff_switch_4chpror3_sonoff_10028b1d36_1
    - action: switch.turn_on
      target:
        entity_id: switch.irrigazione_sonoff_switch_4chpror3_sonoff_10028b1d36_2
    - delay:
        minutes: "{{ states('input_number.irrigazione_durata_c2') | int(0) }}"
    - action: switch.turn_off
      target:
        entity_id: switch.irrigazione_sonoff_switch_4chpror3_sonoff_10028b1d36_2
    - action: switch.turn_on
      target:
        entity_id: switch.irrigazione_sonoff_switch_4chpror3_sonoff_10028b1d36_3
    - delay:
        minutes: "{{ states('input_number.irrigazione_durata_c3') | int(0) }}"
    - action: switch.turn_off
      target:
        entity_id: switch.irrigazione_sonoff_switch_4chpror3_sonoff_10028b1d36_3

#==================================================================================
# SCRIPT: IRRIGAZIONE – CICLA ORA (manuale) — ignora meteo e "salta oggi"
#==================================================================================
irrigazione_cicla_ora:
  alias: "Irrigazione – Cicla ora"
  mode: single
  sequence:
    - action: input_text.set_value
      target:
        entity_id: input_text.irrigazione_motivo_blocco
      data:
        value: "🖐️ Ciclo manuale avviato {{ now().strftime('%d/%m/%Y %H:%M') }}"
    - action: script.irrigazione_esegui_sequenza

#==================================================================================
# SCRIPT: IRRIGAZIONE – STOP (interrompe la sequenza e spegne tutti i canali)
#==================================================================================
irrigazione_stop:
  alias: "Irrigazione – Stop tutti i canali"
  mode: single
  sequence:
    - action: script.turn_off
      target:
        entity_id:
          - script.irrigazione_esegui_sequenza
          - script.irrigazione_cicla_ora
    - action: switch.turn_off
      target:
        entity_id:
          - switch.irrigazione_sonoff_switch_4chpror3_sonoff_10028b1d36_1
          - switch.irrigazione_sonoff_switch_4chpror3_sonoff_10028b1d36_2
          - switch.irrigazione_sonoff_switch_4chpror3_sonoff_10028b1d36_3
    - action: input_text.set_value
      target:
        entity_id: input_text.irrigazione_motivo_blocco
      data:
        value: "⏹️ Irrigazione fermata {{ now().strftime('%d/%m/%Y %H:%M') }}"

#==================================================================================
# SCRIPT: IRRIGAZIONE – SALTA OGGI (toggle) — auto-ripristino a mezzanotte
# Usato dal tap_action del tile Irrigazione in plancia ginepro e irrigazione.
#==================================================================================
irrigazione_salta_toggle:
  alias: "Irrigazione – Salta oggi (toggle)"
  mode: single
  sequence:
    - action: input_boolean.toggle
      target:
        entity_id: input_boolean.irrigazione_salta_oggi
    - action: input_text.set_value
      target:
        entity_id: input_text.irrigazione_motivo_blocco
      data:
        value: >-
          {{ '🖐️ Programma saltato per oggi'
             if is_state('input_boolean.irrigazione_salta_oggi','on')
             else '✅ Programma riattivato' }}

#==================================================================================
# SCRIPT: RIAGGANCIA YAMAHA
# - Forza il Google Home Mini a riprendere lo stream verso la cassa Yamaha BT
# - stop -> attesa -> ripristino volume (notte 1% / giorno 20% solo se era 1%) -> play file uccelli
# - Non interferisce se è in corso musica vera (media_title valorizzato)
#==================================================================================
riaggancia_yamaha:
  alias: "Uccelli"
  mode: single
  sequence:
    - action: media_player.volume_set
      target:
        entity_id: media_player.googlehome8851
      data:
        volume_level: 0.20
    - action: media_player.play_media
      target:
        entity_id: media_player.googlehome8851
      data:
        media_content_id: "http://192.168.1.77:8123/local/birdssongs.mp3"
        media_content_type: "music"

#==================================================================================
# SCRIPT: PANASONIC TOGGLE ON/OFF
# Invia comando diretto via MQTT a HeishaMon
#==================================================================================
panasonic_toggle:
  alias: "Panasonic – Toggle ON/OFF"
  mode: single
  sequence:
    - action: mqtt.publish
      data:
        topic: "panasonic_heat_pump/commands/SetHeatpump"
        payload: >
          {% if states('switch.panasonic_heat_pump_main_heatpump_state') == 'on' %}
            0
          {% else %}
            1
          {% endif %}

#==================================================================================
# SCRIPT: HEISHAMON REBOOT VIA MQTT
#==================================================================================
