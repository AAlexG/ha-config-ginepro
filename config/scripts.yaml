#==================================================================================
# SCRIPT: PERGOLA – TOGGLE MANUALE ("Chiudere fino notte")
# Richiamato dalla card in plancia Tende (tap sul tile del blocco manuale).
#  - Blocco OFF → attiva input_boolean.pergola_blocco_manuale e chiude le
#    lamelle (tilt 0); inseguimento solare e sicurezza meteo restano fermi.
#  - Blocco ON  → disattiva il flag; l'inseguimento solare riprende al
#    prossimo ciclo (max 10 minuti).
# Il flag viene comunque rilasciato alle 07:00/23:00 dall'automazione
# pergola_blocco_manuale_rilascio e alla partenza per vacanza.
#==================================================================================
pergola_toggle_manuale:
  alias: "Pergola – Toggle Manuale"
  mode: single
  sequence:
    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.pergola_blocco_manuale
              state: "off"
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.pergola_blocco_manuale
            - action: cover.set_cover_tilt_position
              target:
                entity_id: cover.terrazzo_pergola_terrazza
              data:
                tilt_position: 0
      default:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.pergola_blocco_manuale


#==================================================================================
# SCRIPT: FONTE - RIPRISTINA PARAMETRI (NUOVO - scripts_41)
#==================================================================================
# Reimposta tutti i parametri manuali della gestione fonte ai valori
# consigliati/di contratto. Richiamato dalla sentinella all'avvio di HA
# (automations_fonte_2) quando rileva la perdita dello stato salvato,
# oppure manualmente da Strumenti per sviluppatori -> Azioni.
# Provenienza dei valori:
#   rendimento 0.95      -> Baxi a condensazione, PCS
#   COP riserva 3.0      -> media stagionale reale PdC
#   soglia surplus 1000  -> assorbimento tipico compressore (W)
#   GSE 0.10             -> baseline; aggiornato da salva_bolletta a ogni bolletta
#   isteresi 15 / ore 3  -> tuning anti-usura valvola pompa-caldaia
#   gas 1.3338           -> bolletta mag 2026 (indice + componenti, IVA 22%)
#   quote fisse 24.11/19.42 -> bolletta apr-mag 2026 (IVA inclusa)
fonte_ripristina_parametri:
  alias: "Fonte - Ripristina parametri"
  icon: mdi:backup-restore
  mode: single
  sequence:
    - action: input_number.set_value
      target:
        entity_id: input_number.caldaia_rendimento
      data:
        value: 0.95
    - action: input_number.set_value
      target:
        entity_id: input_number.pdc_cop_fallback
      data:
        value: 3.0
    - action: input_number.set_value
      target:
        entity_id: input_number.pv_surplus_soglia
      data:
        value: 1000
    - action: input_number.set_value
