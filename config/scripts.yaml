#==================================================================================
# SCRIPT: SALVA BOLLETTA
# Chiama shell_command.salva_bolletta (Python -> SQLite). Lo script Python
# salva i valori bolletta E ricalcola:
#   input_number.elettricita_prezzo_kwh (€ bollette elettriche / kWh bollette)
#   input_number.gas_prezzo_mc          (€ bollette gas / m³ bollette)
# restituendo il risultato come JSON su stdout. Entrambi i campi restano
# comunque modificabili a mano in qualsiasi momento – vengono solo
# aggiornati ad ogni nuovo salvataggio bolletta.
#==================================================================================
salva_bolletta:
  alias: "Bollette – Salva nel DB"
  mode: single
  sequence:
    - action: shell_command.salva_bolletta
      response_variable: risultato
    - variables:
        dati: "{{ risultato.stdout | from_json }}"
    - if:
        - condition: template
          value_template: "{{ dati.ok }}"
      then:
        - action: input_number.set_value
          target:
            entity_id: input_number.elettricita_prezzo_kwh
          data:
            value: "{{ dati.prezzo_kwh }}"
        - action: input_number.set_value
          target:
            entity_id: input_number.gas_prezzo_mc
          data:
            value: "{{ dati.prezzo_mc_gas }}"
        - action: notify.mobile_app_cph2653
          data:
            title: "💾 Bolletta salvata"
            message: >
              Dati salvati per {{ states('input_select.bolletta_mese_sel') }}.
              Prezzo €/kWh: {{ dati.prezzo_kwh }} – Prezzo €/m³ gas: {{ dati.prezzo_mc_gas }}
              Dettagli in /config/bolletta_log.txt
      else:
        - action: notify.mobile_app_cph2653
          data:
            title: "⚠️ Errore salvataggio bolletta"
            message: >-
              {{ dati.errore | default('errore sconosciuto') }} – vedi /config/bolletta_log.txt

#==================================================================================
# SCRIPT: IRRIGAZIONE TOGGLE MANUALE
# Chiamato dal tap_action del tile Irrigazione in plancia ginepro.
# Esegue: toggle switch + attiva flag manuale + scrive messaggio nel campo testo.
# Approccio diretto: nessuna dipendenza dal context del trigger.
#==================================================================================
irrigazione_toggle_manuale:
  alias: "Irrigazione – Toggle Manuale"
  mode: single
  sequence:
    - action: switch.toggle
      target:
        entity_id: switch.sonoff_irrigation_block
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.irrigazione_manuale_oggi
    - action: input_text.set_value
      target:
        entity_id: input_text.irrigazione_motivo_blocco
      data:
        value: "🖐️ È stato scelto gestione manuale per oggi"

#==================================================================================
# SCRIPT: RIAGGANCIA YAMAHA
# - Forza il Google Home Mini a riprendere lo stream verso la cassa Yamaha BT
# - stop -> attesa -> ripristino volume (notte 1% / giorno 20% solo se era 1%) -> play file uccelli
# - Non interferisce se è in corso musica vera (media_title valorizzato)
#==================================================================================
riaggancia_yamaha:
  alias: "Uccelli"
  mode: single
  sequence:
    - action: media_player.volume_set
      target:
        entity_id: media_player.googlehome8851
      data:
        volume_level: 0.20
    - action: media_player.play_media
      target:
        entity_id: media_player.googlehome8851
      data:
        media_content_id: "http://192.168.1.77:8123/local/birdssongs.mp3"
        media_content_type: "music"

#==================================================================================
# SCRIPT: PANASONIC TOGGLE ON/OFF
# Invia comando diretto via MQTT a HeishaMon
#==================================================================================
panasonic_toggle:
  alias: "Panasonic – Toggle ON/OFF"
  mode: single
  sequence:
    - action: mqtt.publish
      data:
        topic: "panasonic_heat_pump/commands/SetHeatpump"
        payload: >
          {% if states('switch.panasonic_heat_pump_main_heatpump_state') == 'on' %}
            0
          {% else %}
            1
          {% endif %}

#==================================================================================
# SCRIPT: HEISHAMON REBOOT VIA MQTT
#==================================================================================
heishamon_reboot:
  alias: "HeishaMon – Reboot via MQTT"
  mode: single
  sequence:
    - action: mqtt.publish
      data:
        topic: "panasonic_heat_pump/commands/SetReboot"
        payload: "1"

#==================================================================================
# SCRIPT: PANASONIC SET TARGET TEMPERATURA MANDATA
# Legge il valore da input_number.panasonic_target_mandata_manuale e lo invia
#==================================================================================
panasonic_set_target_mandata:
  alias: "Panasonic – Imposta Target Mandata Manuale"
  mode: single
  sequence:
    - action: mqtt.publish
      data:
        topic: "panasonic_heat_pump/commands/SetZ1CoolRequestTemperature"
        payload: "{{ states('input_number.panasonic_target_mandata_manuale') | int }}"

#==================================================================================
# SCRIPT: CALDAIA DHW ON
