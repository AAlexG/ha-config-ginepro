# scripts_37.yaml

#==================================================================================
# SCRIPT: APRI CANCELLO CASA
#==================================================================================
apri_cancello_casa:
  alias: "Cancello Casa - Apri/Chiudi"
  mode: single
  sequence:
    - action: remote.send_command
      target:
        entity_id: remote.055_broadlink_salotto
      data:
        device: emylo
        command: cancello_casa


#==================================================================================
# SCRIPT: APRI GRANDE CANCELLO
#==================================================================================
apri_grande_cancello:
  alias: "Grande Cancello - Apri/Chiudi"
  mode: single
  sequence:
    - action: button.press
      target:
        entity_id: button.10007c3b31_1
    - if:
        - condition: state
          entity_id: input_boolean.grande_cancello_status_helper
          state: "off"
      then:
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.grande_cancello_status_helper
      else:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.grande_cancello_status_helper

#==================================================================================
# SCRIPT: APRI BOX COMBO
#==================================================================================
apri_box_combo:
  alias: "Box - Portone + Grande Cancello"
  mode: single
  sequence:
    - action: button.press
      target:
        entity_id: button.portone_telecomando
    - action: button.press
      target:
        entity_id: button.10007c3b31_1
    - if:
        - condition: state
          entity_id: input_boolean.grande_cancello_status_helper
          state: "off"
      then:
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.grande_cancello_status_helper
      else:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.grande_cancello_status_helper

#==================================================================================
# SCRIPT: SIRENA ON
# - Accende tutte le 6 sirene
# - Attiva input_boolean.sirena_attiva (usato come flag per interrompere il loop)
# - Ripete messaggio vocale su tutti i Google Home x10 (interrompibile)
#==================================================================================
sirena_on:
  alias: "Sirena ON - Tutte + Google Home"
  mode: single
  sequence:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.sirena_attiva
    - action: siren.turn_on
      target:
        entity_id:
          - siren.179_camera_cancello_sirena
          - siren.camera_georgi_reolink_sirena
          - siren.170_camera_cucina_5mp_sirena
          - siren.177_camera_nata_reolink_zoom_sirena
          - siren.camera_box_reolink_sirena
          - siren.184_camera_tania_sirena
    - variables:
        vol_salotto: "{{ state_attr('media_player.salotto', 'volume_level') | float(0.5) }}"
        vol_cromecast_sotto: "{{ state_attr('media_player.cromecast_sotto', 'volume_level') | float(0.5) }}"
        vol_google_home_georgi: "{{ state_attr('media_player.google_home_georgi', 'volume_level') | float(0.5) }}"
        vol_google_home_sopra: "{{ state_attr('media_player.google_home_sopra', 'volume_level') | float(0.5) }}"
        vol_googlehome8851: "{{ state_attr('media_player.googlehome8851', 'volume_level') | float(0.5) }}"
    - action: media_player.turn_on
      target:
        entity_id: media_player.tutti_gli_speaker
    - delay: "00:00:01"
    - action: media_player.volume_set
      target:
        entity_id:
          - media_player.salotto
          - media_player.cromecast_sotto
          - media_player.google_home_georgi
          - media_player.google_home_sopra
          - media_player.googlehome8851
      data:
        volume_level: 1.0
    - repeat:
        count: 10
        sequence:
          - condition: state
            entity_id: input_boolean.sirena_attiva
            state: "on"
          - action: tts.speak
            target:
              entity_id: tts.google_translate_en_com
            data:
              media_player_entity_id: media_player.tutti_gli_speaker
              message: "Chiamata preregistrata a carabinieri è partita. Ladri in casa"
              language: it
              cache: true
              options:
                preferred_format: mp3
                preferred_sample_rate: "44100"
          - delay: "00:00:15"
    - action: media_player.volume_set
      target:
        entity_id: media_player.salotto
      data:
        volume_level: "{{ vol_salotto }}"
    - action: media_player.volume_set
      target:
        entity_id: media_player.cromecast_sotto
      data:
        volume_level: "{{ vol_cromecast_sotto }}"
    - action: media_player.volume_set
      target:
        entity_id: media_player.google_home_georgi
      data:
        volume_level: "{{ vol_google_home_georgi }}"
    - action: media_player.volume_set
      target:
        entity_id: media_player.google_home_sopra
      data:
        volume_level: "{{ vol_google_home_sopra }}"
    - action: media_player.volume_set
      target:
        entity_id: media_player.googlehome8851
      data:
        volume_level: "{{ vol_googlehome8851 }}"


#==================================================================================
# SCRIPT: SIRENA OFF
# - Disattiva flag (interrompe loop messaggi)
# - Spegne tutte le 6 sirene
# - Ferma audio su tutti i Google Home
#==================================================================================
sirena_off:
  alias: "Sirena OFF - Tutte + Stop Google Home"
  mode: single
  sequence:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.sirena_attiva
    - action: siren.turn_off
      target:
        entity_id:
          - siren.179_camera_cancello_sirena
          - siren.camera_georgi_reolink_sirena
          - siren.170_camera_cucina_5mp_sirena
          - siren.177_camera_nata_reolink_zoom_sirena
          - siren.camera_box_reolink_sirena
          - siren.184_camera_tania_sirena


