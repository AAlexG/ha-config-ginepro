# automations_presenza_10.yaml

#==================================================================================
# 1. NOTIFICA - Nuovo dispositivo MAI VISTO rilevato sulla rete
#==================================================================================
- id: notifica_nuovo_dispositivo_rete
  alias: "Presenza - Nuovo dispositivo sulla rete"
  mode: queued
  max: 10
  variables:
    # Fonte unica: mappa mac_nomi del sensore "WiFi Dispositivi" (configuration.yaml)
    mac_whitelist: &mac_whitelist >-
      {{ (state_attr('sensor.wifi_dispositivi', 'mac_nomi') or {}) | list | map('lower') | list }}
  triggers:
    - platform: event
      event_type: entity_registry_updated
      event_data:
        action: create
  condition:
    - condition: template
      value_template: "{{ trigger.event.data.entity_id.startswith('device_tracker.') }}"
  action:
    - delay: "00:00:10"
    - variables:
        eid: "{{ trigger.event.data.entity_id }}"
        dev_mac: "{{ (state_attr(eid, 'mac') or '') | lower }}"
    - condition: template
      value_template: "{{ dev_mac not in (mac_whitelist | map('lower') | list) }}"
    - action: notify.mobile_app_cph2653
      data:
        title: "Rete - NUOVO dispositivo"
        message: >-
          {{ state_attr(eid, 'friendly_name') or eid }}
          | IP: {{ state_attr(eid, 'ip') or 'n/d' }}
          | MAC: {{ state_attr(eid, 'mac') or 'n/d' }}
          | Host: {{ state_attr(eid, 'host_name') or 'n/d' }}

#==================================================================================
# 2. NOTIFICA - Dispositivo noto (non whitelist) si collega alla rete
#    Notifica solo se il MAC NON è nella whitelist dei dispositivi conosciuti.
#    Il S22 di Tania è volutamente fuori whitelist: la sua connessione notifica.
#    Tracker senza attributo MAC (app Companion, GPS) vengono ignorati.
#==================================================================================
- id: notifica_dispositivo_connesso_rete
  alias: "Presenza - Dispositivo connesso alla rete"
  mode: queued
  max: 10
  variables:
    mac_whitelist: *mac_whitelist
  triggers:
    # Elenco esplicito dei tracker Netgear (da integration_entities, 22/07/2026).
    # Il filtro "to: home" avviene nel core, senza valutare template a ogni
    # evento del sistema. I dispositivi NUOVI non in elenco sono comunque
    # coperti dall'automazione 1 (entity_registry_updated); dopo averli
    # aggiunti alla whitelist, aggiungerli anche a questo elenco.
    - platform: state
      entity_id:
        - device_tracker.186_camera_sopra_8k_reolink
        - device_tracker.168_camera_georgi_reolink_e1
        - device_tracker.055_broadlink_salotto
        - device_tracker.193_camera_cucina_reolink
        - device_tracker.184_camera_tania_reolink_e1_zoom
        - device_tracker.177_camera_nata_reolink_e1zoom
        - device_tracker.192_camera_barbeque_reolink
        - device_tracker.182_camera_box_reolink_e1pro
        - device_tracker.183_camera_portone_reolinklumus
        - device_tracker.047_sonoff_433_rf_bridge
        - device_tracker.sonoff_sonoff_wifi_switch
        - device_tracker.191_camera_sopra_gambe_citronics
        - device_tracker.tapo_smart_plug_sotto_tplink
        - device_tracker.179_camera_cancello_reolink
        - device_tracker.019_inverter_uflex_wifi_modul
        - device_tracker.064_shelly_valvola_pompa_caldaia
        - device_tracker.espressif
        - device_tracker.032_fancoil_tania_shelly_1_gen4
        - device_tracker.031_fancoil_georgi_shelly_1_gen4
        - device_tracker.034_fancoil_sala_shelly_1_gen4
        - device_tracker.google_chromecast
        - device_tracker.box_deumidificatore_cantina_sonoff
        - device_tracker.unknown
        - device_tracker.005_tv_sala_sony
        - device_tracker.somfy_connectivity_kit
        - device_tracker.google_nest_sopra
        - device_tracker.046_lavatrice_miele
        - device_tracker.018_repeater_tp_re650
        - device_tracker.077_rapsberry_pi
        - device_tracker.037_heishamon_via_re650
        - device_tracker.036_otgw_x_baxi_via_re650
        - device_tracker.stazione_meteo_sottotetto
        - device_tracker.google_home_camera_georgi
        - device_tracker.presa_luce_cucina
        - device_tracker.contattore_auto
        - device_tracker.google_home_mini_yamaha
        - device_tracker.011_stazione_meteo_sala
        - device_tracker.oneplus_13
        - device_tracker.chromecast_sotto
        - device_tracker.google_nest_sala
        - device_tracker.sony_tv_sopra
        - device_tracker.pet_feeder
        - device_tracker.s22_ultra_di_tania
        - device_tracker.aspirapolvere_lina
        - device_tracker.085_camera_sotto_pergola_ezviz
        - device_tracker.048_sasha_msi_pc
        - device_tracker.luce_sopra_tuya
        - device_tracker.cooktop_samsung
        - device_tracker.wnc
        - device_tracker.dev_15_f3_cc
        - device_tracker.dev_7c_cf_ce
        - device_tracker.dev_08_0f_b8
        - device_tracker.dev_c0_d0_9c
        - device_tracker.017_satellite_rbs50_box
        - device_tracker.dev_b3_47_56
        - device_tracker.netgear_orbi_satellite_rbs50
        - device_tracker.cameratania_deumidificatore_tania_tuya
        - device_tracker.001_modem_fastweb
      to: "home"
  condition:
    # Tracker senza attributo MAC (app Companion, GPS) ignorati; notifica
    # solo se il MAC non e' nella whitelist dei dispositivi conosciuti.
    - condition: template
      value_template: >-
        {{ (trigger.to_state.attributes.get('mac', '') or '') != ''
           and (trigger.to_state.attributes.get('mac', '') | lower) not in (mac_whitelist | map('lower') | list) }}
  action:
    - action: notify.mobile_app_cph2653
      data:
        title: "Rete - dispositivo connesso"
        message: >-
          {{ trigger.to_state.attributes.get('friendly_name', trigger.entity_id) }}
          | IP: {{ trigger.to_state.attributes.get('ip', 'n/d') }}
          | MAC: {{ trigger.to_state.attributes.get('mac', 'n/d') }}
          | Host: {{ trigger.to_state.attributes.get('host_name', 'n/d') }}
          

#==================================================================================
# 3. NOTIFICA - Tania esce di casa (ritardo 2 min anti falsi positivi GPS)
#==================================================================================
- id: notifica_tania_uscita
  alias: "Presenza - Tania esce di casa"
  mode: single
  triggers:
    - platform: state
      entity_id: person.tania
      from: "home"
      to: "not_home"
      for: "00:02:00"
  action:
    - action: notify.mobile_app_cph2653
      data:
        title: "Presenza"
        message: >-
          Tania è uscita di casa alle {{ (now() - timedelta(minutes=2)).strftime('%H:%M') }}

#==================================================================================
# 4. NOTIFICA - Tania rientra a casa (immediata)
#==================================================================================
- id: notifica_tania_rientro
  alias: "Presenza - Tania rientra a casa"
  mode: single
  triggers:
    - platform: state
      entity_id: person.tania
      from: "not_home"
      to: "home"
  action:
    - action: notify.mobile_app_cph2653
      data:
        title: "Presenza"
        message: "Tania è rientrata a casa"