#==================================================================================
# 8. CONTROLLO VELOCITÀ VENTOLA ARGON (CPU TEMP + LIMITE NOTTE)
#==================================================================================
- id: controllo_ventola_argon_cpu
  alias: "Ventola Argon - Controllo velocità per CPU temp"
  mode: single
  triggers:
    - platform: time_pattern
      minutes: "/5"
  condition: []
  action:
    - variables:
        cpu_temp: "{{ states('sensor.rpi_cpu_temperature') | float(0) }}"
        notte: "{{ now().hour + now().minute / 60 >= 23.5 or now().hour + now().minute / 60 < 8.5 }}"
        velocita: "{{ 0 if cpu_temp | float < 15 else 10 if cpu_temp | float < 30 else 20 if cpu_temp | float < 45 else 40 if cpu_temp | float < 55 else (40 if notte else 70) if cpu_temp | float < 65 else (40 if notte else 100) }}"
    - action: fan.set_percentage
      target:
        entity_id: fan.rpi_fan_controller_ventilatore_argon
      data:
        percentage: "{{ velocita | int }}"

