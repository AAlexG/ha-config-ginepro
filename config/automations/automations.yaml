#==================================================================================
# 26. ACQUA – Reset giornaliero mezzanotte
#
# Ogni notte alle 23:00:
#   1. Legge sensor.acqua_oggi_euro e lo aggiunge all'accumulatore.
#   2. Accumula m³ giornalieri.
#   3. Azzera counter.irrigazione_minuti_oggi.
#   4. Azzera input_number.caldaia_dhw_durata_acc → ripartenza da 0 per il nuovo
#      giorno (valido sia in estate che in inverno; in inverno il sensore non usa
#      questo accumulatore, ma è corretto azzerarlo comunque per coerenza).
#==================================================================================
- id: acqua_reset_mezzanotte
  alias: "Acqua – Reset giornaliero mezzanotte"
  description: "Salva costo e m³ giornalieri negli accumulatori, azzera contatori"
  mode: single
  triggers:
    - platform: time
      at: "23:59:00"
  action:
    # 1. Accumula costo del giorno nell'accumulatore
    - action: input_number.set_value
      target:
        entity_id: input_number.acqua_costo_acc
      data:
        value: >
          {{ ([states('input_number.acqua_costo_acc') | float(0) +
               states('sensor.acqua_oggi_euro') | float(0), 0] | max) | round(2) }}
    # 2. Accumula m³ del giorno nell'accumulatore
    - action: input_number.set_value
      target:
        entity_id: input_number.acqua_consumo_acc
      data:
        value: >
          {{ ([states('input_number.acqua_consumo_acc') | float(0) +
               states('sensor.acqua_oggi_mc') | float(0), 0] | max) | round(4) }}
    # 3. Azzera minuti irrigazione per il nuovo giorno
    - action: counter.reset
      target:
        entity_id: counter.irrigazione_minuti_oggi
    # 4. Azzera accumulatore minuti DHW per il nuovo giorno
    #    (in estate viene ricostruito dall'automazione caldaia_dhw_accumula_minuti;
    #     in inverno il sensore usa il valore fisso e questo rimane a 0)
    - action: input_number.set_value
      target:
        entity_id: input_number.caldaia_dhw_durata_acc
      data:
        value: "0"
    # 5. C4 (acqua fredda manuale) NON viene azzerata:
    #    il valore del giorno precedente resta come punto di partenza

#==================================================================================
# 27. RESET INIZIO MESE – ogni 1° del mese alle 00:00:30
# Salva i valori correnti degli accumulatori come baseline del nuovo mese
#==================================================================================
- id: reset_inizio_mese
  alias: "Reset inizio mese – aggiorna baseline accumulatori"
  mode: single
  triggers:
    - platform: time
      at: "00:00:30"
  conditions:
    - condition: template
      value_template: "{{ now().day == 1 }}"
  action:
    - action: input_number.set_value
      target:
        entity_id: input_number.gas_inizio_mese
      data:
        value: "{{ states('input_number.caldaia_gas_totale_acc') | float(0) }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.acqua_costo_inizio_mese
      data:
        value: "{{ states('input_number.acqua_costo_acc') | float(0) }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.acqua_mc_inizio_mese
      data:
        value: "{{ states('input_number.acqua_consumo_acc') | float(0) }}"

#==================================================================================
# 28. BOLLETTE – Aggiorna lista mesi nel combo box
#
# All'avvio di HA e ogni 1° del mese aggiorna le opzioni di
# input_select.bolletta_mese_sel con gli ultimi 12 mesi + placeholder.
# Formato opzioni: "MM/YYYY" (es. "05/2026").
#==================================================================================
- id: aggiorna_bolletta_mese
  alias: "Bollette – Aggiorna lista mesi"
  mode: single
  triggers:
    - platform: homeassistant
      event: start
    - platform: time
      at: "00:00:00"
  condition:
    - condition: template
      value_template: >
        {{ trigger.platform == 'homeassistant' or now().day == 1 }}
  action:
    - action: input_select.set_options
      target:
        entity_id: input_select.bolletta_mese_sel
      data:
        options: >
          {% set ns = namespace(opts=["-- seleziona --"]) %}
          {% for j in range(11, -1, -1) %}
            {% set m = now().month - j %}
            {% set y = now().year %}
            {% if m <= 0 %}
              {% set m = m + 12 %}
              {% set y = y - 1 %}
            {% endif %}
            {% set ns.opts = ns.opts + ["%02d/%d" | format(m, y)] %}
          {% endfor %}
          {{ ns.opts }}

#==================================================================================
# 29. ACQUA – Reset dhw_durata_acc all'avvio di HA
# Resetta SOLO il contatore minuti DHW senza toccare gli accumulatori mensili.
# I sensori template ricalcolano automaticamente i valori al riavvio.
#==================================================================================
- id: acqua_reset_avvio_ha
  alias: "Acqua – Reset dhw_durata_acc all'avvio HA"
  mode: single
  triggers:
    - platform: homeassistant
      event: start
  action:
    - delay: "00:00:30"
    - action: input_number.set_value
      target:
        entity_id: input_number.caldaia_dhw_durata_acc
      data:
        value: "0"

#==================================================================================
# 30. TOTALI CONSUMI – Aggiorna input_number rilevato/bollette via script Python
# Lo script stampa un JSON su stdout; response_variable lo legge e imposta
# i 6 input_number con set_value – nessun token necessario.
# Trigger: avvio HA (delay 60s per recorder pronto) + ogni ora.
#==================================================================================
- id: calcola_totali_consumi
  alias: "Consumi – Aggiorna totali rilevato e bollette"
  mode: single
  triggers:
    - platform: homeassistant
      event: start
    - platform: time_pattern
      hours: "/1"
  action:
    - delay: "00:01:00"
    - action: shell_command.calcola_totali_consumi
      response_variable: totali
    - action: input_number.set_value
      target:
        entity_id: input_number.gas_totale_rilevato_mc
      data:
        value: "{{ (totali.stdout | from_json).gas_rilevato }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.gas_totale_bollette_mc
      data:
        value: "{{ (totali.stdout | from_json).gas_bollette }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.elettricita_totale_rilevato_kwh
      data:
        value: "{{ (totali.stdout | from_json).elec_rilevato }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.elettricita_totale_bollette_kwh
      data:
        value: "{{ (totali.stdout | from_json).elec_bollette }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.acqua_totale_rilevato_mc
      data:
        value: "{{ (totali.stdout | from_json).acqua_rilevato }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.acqua_totale_bollette_mc
      data:
        value: "{{ (totali.stdout | from_json).acqua_bollette }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.pv_risparmio_euro
      data:
        value: "{{ (totali.stdout | from_json).pv_risparmio }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.pv_gse_euro
      data:
        value: "{{ (totali.stdout | from_json).pv_gse }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.pv_totale_euro
      data:
        value: "{{ (totali.stdout | from_json).pv_totale }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.pv_recupero_pct
      data:
        value: "{{ (totali.stdout | from_json).pv_recupero_pct }}"

#==================================================================================
# 31. YAMAHA WS-B1A KEEPALIVE – Suono uccelli via Google Mini
#
# Mantiene la Yamaha WS-B1A sempre accesa evitando l'Auto Standby (8h).
# File audio locale: /config/www/birdssongs.mp3
# Volume giorno  (08:30–00:00): 0.5 (50%)
# Volume notte   (00:00–08:30): 0.01 (1%)
# Entità: media_player.googlehome8851
#==================================================================================

# 31a. AVVIO MATTUTINO – 08:30
- id: yamaha_keepalive_avvio_mattino
  alias: "Yamaha Keepalive - Avvio mattino (08:30)"
  mode: single
  triggers:
    - platform: time
      at: "08:30:00"
  condition:
    - condition: state
      entity_id: input_boolean.vacanza
      state: "off"
    - condition: template
      value_template: "{{ state_attr('media_player.googlehome8851', 'media_title') is none }}"
  action:
    - if:
        - condition: template
          value_template: "{{ (state_attr('media_player.googlehome8851', 'volume_level') | float(0) * 100) | round(0) == 1 }}"
      then:
        - action: media_player.volume_set
          target:
            entity_id: media_player.googlehome8851
          data:
            volume_level: 0.20
    - action: media_player.play_media
      target:
        entity_id: media_player.googlehome8851
      data:
        media_content_id: "http://192.168.1.77:8123/local/birdssongs.mp3"
        media_content_type: "music"

# 31b. TRANSIZIONE NOTTE – 00:00
- id: yamaha_keepalive_transizione_notte
  alias: "Yamaha Keepalive - Transizione notte (00:00)"
  mode: single
  triggers:
    - platform: time
      at: "00:00:00"
  condition:
    - condition: state
      entity_id: input_boolean.vacanza
      state: "off"
    - condition: template
      value_template: "{{ state_attr('media_player.googlehome8851', 'media_title') is none }}"
  action:
    - action: media_player.volume_set
      target:
        entity_id: media_player.googlehome8851
      data:
        volume_level: 0.01
    - action: media_player.play_media
      target:
        entity_id: media_player.googlehome8851
      data:
        media_content_id: "http://192.168.1.77:8123/local/birdssongs.mp3"
        media_content_type: "music"

# 31c. RIPRISTINO DOPO STOP (es. "Ok Google, stop")
- id: yamaha_keepalive_ripristino_dopo_stop
  alias: "Yamaha Keepalive - Ripristino dopo stop"
  mode: single
  max_exceeded: silent
  triggers:
    - platform: state
      entity_id: media_player.googlehome8851
      to:
        - "idle"
        - "paused"
      for: "00:00:30"
  condition:
    - condition: state
      entity_id: input_boolean.vacanza
      state: "off"
    - condition: template
      value_template: "{{ state_attr('media_player.googlehome8851', 'media_title') is none }}"
  action:
    - variables:
        ora: "{{ now().hour + now().minute / 60 }}"
        e_notte: "{{ not (ora >= 8.5 and ora < 24.0) }}"
        vol_attuale: "{{ (state_attr('media_player.googlehome8851', 'volume_level') | float(0) * 100) | round(0) }}"
    - if:
        - condition: template
          value_template: "{{ e_notte }}"
      then:
        - action: media_player.volume_set
          target:
            entity_id: media_player.googlehome8851
          data:
            volume_level: 0.01
      else:
        - if:
            - condition: template
              value_template: "{{ vol_attuale == 1 }}"
          then:
            - action: media_player.volume_set
              target:
                entity_id: media_player.googlehome8851
              data:
                volume_level: 0.20
    - action: media_player.play_media
      target:
        entity_id: media_player.googlehome8851
      data:
        media_content_id: "http://192.168.1.77:8123/local/birdssongs.mp3"
        media_content_type: "music"

