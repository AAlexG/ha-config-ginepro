#==================================================================================
# 35. SISTEMA – Aggiornamenti automatici dopo il backup notturno
#
# Il backup giornaliero parte alle 05:00. L'installazione degli aggiornamenti
# parte alle 05:30 per lasciare margine al completamento del backup.
# La notifica con l'elenco viene inviata PRIMA dell'installazione, perché
# gli aggiornamenti di Core/OS riavviano HA e interromperebbero l'automazione
# prima dell'invio.
#==================================================================================
- id: sistema_aggiornamenti_automatici_notturni
  alias: "Sistema - Aggiornamenti automatici dopo backup"
  mode: single
  triggers:
    - platform: time
      at: "05:30:00"
  condition:
    - condition: template
      value_template: >
        {{ states.update | selectattr('state', 'eq', 'on') | list | count > 0 }}
  action:
    - variables:
        entita_da_aggiornare: >
          {{ states.update | selectattr('state', 'eq', 'on')
             | map(attribute='entity_id') | list }}
        elenco_aggiornamenti: >-
          {% for e in states.update | selectattr('state', 'eq', 'on') %}
          • {{ e.name }}: {{ e.attributes.installed_version }} → {{ e.attributes.latest_version }}
          {% endfor %}
    - action: notify.mobile_app_cph2653
      data:
        title: "🔄 Installazione aggiornamenti ({{ entita_da_aggiornare | count }})"
        message: "{{ elenco_aggiornamenti | trim }}"
        data:
          ttl: 0
    - action: update.install
      target:
        entity_id: "{{ entita_da_aggiornare }}"
      continue_on_error: true

#==================================================================================
#==================================================================================
# 36. HEISHAMON - NESSUN DATO RICEVUTO DA 30 MINUTI
#
# Usa direttamente binary_sensor.panasonic_heat_pump_lwt, il sensore LWT
# (Last Will and Testament) pubblicato da HeishaMon: passa a "off" quando
# il broker MQTT rileva la disconnessione del dispositivo.
#==================================================================================
- id: heishamon_nessun_dato_30min
  alias: "HeishaMon - Nessun dato ricevuto da 30 min"
  mode: single
  triggers:
    - platform: state
      entity_id: binary_sensor.panasonic_heat_pump_lwt
      to: "off"
      for: "00:30:00"
  action:
    - action: notify.mobile_app_cph2653
      data:
        title: "🛑 HeishaMon - Nessun dato da 30 min"
        message: "HeishaMon risulta irraggiungibile (LWT offline) da almeno 30 minuti."
        data:
          priority: high
          ttl: 0
          persistent: "true"

#==================================================================================
# 37. OTGW - NESSUN DATO RICEVUTO DA 30 MINUTI
#
# Rileva se l'OTGW smette di pubblicare dati (MQTT interrotto, ESP
# bloccato, WiFi caduto). Usa sensor.opentherm_gateway_otgw_stats_free_heap
# come "battito cardiaco": HA lo marca "unavailable" quando il broker MQTT
# rileva la disconnessione del dispositivo (LWT).
# Diverso dall'automazione "OTGW - Notifica caldaia disconnessa" (n.18),
# che rileva la sola disconnessione caldaia-OTGW, non del dispositivo OTGW.
#==================================================================================
- id: otgw_nessun_dato_30min
  alias: "OTGW - Nessun dato ricevuto da 30 min"
  mode: single
  triggers:
    - platform: state
      entity_id: sensor.opentherm_gateway_otgw_stats_free_heap
      to: "unavailable"
      for: "00:30:00"
  action:
    - action: notify.mobile_app_cph2653
      data:
        title: "🛑 OTGW - Nessun dato da 30 min"
        message: "L'OTGW risulta irraggiungibile (nessun dato MQTT) da almeno 30 minuti."
        data:
          priority: high
          ttl: 0
          persistent: "true"

#==================================================================================
# 38. BACKUP CONFIG SU GITHUB
#
# Avvia l'addon Home Assistant Git Exporter ogni notte alle 03:15 e ad ogni
# riavvio del core (rapido o completo), per mantenere sincronizzato il
# repository GitHub con la configurazione reale su /config.
#==================================================================================
- id: copy_config_su_github
  alias: "Copia su GitHub alle 3:15"
  mode: single
  triggers:
    - platform: time
      at: "03:15:00"
    - platform: homeassistant
      event: start
  action:
    - action: hassio.addon_start
      data:
        addon: "68413af6_git-exporter"

#==================================================================================
# 39. BACKUP CONFIG SU GITHUB - DOPO MODIFICA (DEBOUNCE 5 MIN)
#==================================================================================
- id: copy_config_su_github_debounce
  alias: "Copia su GitHub dopo modifica"
  mode: restart
  triggers:
    - platform: state
      entity_id: sensor.ultima_modifica_configurazione
  conditions:
    - condition: template
      value_template: >-
        {{ trigger.from_state is not none 
           and trigger.from_state.state not in ['unknown', 'unavailable'] 
           and trigger.to_state.state not in ['unknown', 'unavailable']
           and trigger.to_state.state | int > trigger.from_state.state | int }}
  actions:
    - delay: "00:05:00" # <--- Attende 5 minuti dall'ultimo cambio di stato del sensore
    - action: hassio.addon_start
      data:
        addon: "68413af6_git-exporter"