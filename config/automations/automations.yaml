# automations_119.yaml
#prova
#==================================================================================
# 1. IRRIGAZIONE – Ciclo programmato (O1/O2) con gate meteo
#==================================================================================
- id: irrigazione_ciclo_programmato
  alias: "Irrigazione – Ciclo programmato (O1/O2)"
  mode: single
  max_exceeded: silent
  triggers:
    - platform: time
      at: input_datetime.irrigazione_ora_mattino
    - platform: time
      at: input_datetime.irrigazione_ora_sera
  condition: []
  action:
    - if:
        - condition: state
          entity_id: input_boolean.irrigazione_salta_oggi
          state: 'on'
      then:
        - action: input_text.set_value
          target:
            entity_id: input_text.irrigazione_motivo_blocco
          data:
            value: "🖐️ Programma saltato per oggi"
        - stop: "Salta oggi attivo"

    - action: weather.get_forecasts
      target:
        entity_id: weather.casa
      data:
        type: hourly
      response_variable: previsioni

    - variables:
        ora_esecuzione: "{{ now().strftime('%d/%m/%Y %H:%M') }}"
        soglia: "{{ states('input_number.irrigazione_soglia_umidita') | float(40) }}"
        s1: "{{ states('sensor.soil_moisture_1') | float(0) }}"
        s2: "{{ states('sensor.soil_moisture_2') | float(0) }}"
        vento: "{{ states('sensor.wind_speed_media_1h') | float(0) }}"
        rain_rate: "{{ states('sensor.hp1000se_pro_pro_v1_6_4_hourly_rain') | float(0) }}"

    - variables:
        motivi: >
          {% set ns = namespace(lista=[]) %}
          {% if rain_rate > 0 %}
            {% set ns.lista = ns.lista + ['🌧️ Pioggia: ' ~ (rain_rate | round(1) | string) ~ ' mm (1h)'] %}
          {% endif %}
          {% if s1 > soglia and s2 > soglia %}
            {% set ns.lista = ns.lista + ['💧 Umidità S1=' ~ (s1 | round(0) | int | string) ~ '% S2=' ~ (s2 | round(0) | int | string) ~ '%'] %}
          {% endif %}
          {% if vento > 40 %}
            {% set ns.lista = ns.lista + ['🌬️ Vento ' ~ (vento | round(1) | string) ~ ' km/h'] %}
          {% endif %}
          {% set f = previsioni['weather.casa'].forecast %}
          {% if f[:5] | selectattr('condition', 'in', ['rainy','showers','pouring','hail']) | list | count > 0 %}
            {% set ns.lista = ns.lista + ['🌦️ Prev. pioggia 5h'] %}
          {% endif %}
          {{ ns.lista | join('\n') }}
        blocco: >
          {{ rain_rate > 0
             or (s1 > soglia and s2 > soglia)
             or vento > 40
             or (previsioni['weather.casa'].forecast[:5]
                 | selectattr('condition', 'in', ['rainy','showers','pouring','hail'])
                 | list | count > 0) }}

    - if:
        - condition: template
          value_template: "{{ blocco | bool }}"
      then:
        - action: input_text.set_value
          target:
            entity_id: input_text.irrigazione_motivo_blocco
          data:
            value: "{{ ('⛔ Bloccata ' ~ ora_esecuzione ~ '\n' ~ (motivi | trim)) | trim }}"
        - stop: "Meteo sfavorevole – nessuna irrigazione"

    - action: input_text.set_value
      target:
        entity_id: input_text.irrigazione_motivo_blocco
      data:
        value: "✅ Permessa {{ ora_esecuzione }}"
    - action: script.irrigazione_esegui_sequenza

#==================================================================================
# 1b. ACQUA – Accumula minuti irrigazione (tick ogni minuto)
# Interblocco HW: max 1 canale ON => 1 tick = 1 minuto-canale. Robusto ai riavvii.
#==================================================================================
- id: acqua_accumula_minuti_irrigazione
  alias: "Acqua – Accumula minuti irrigazione"
  mode: single
  triggers:
    - platform: time_pattern
      minutes: "/1"
  condition:
    - condition: or
      conditions:
        - condition: state
          entity_id: switch.irrigazione_sonoff_switch_4chpror3_sonoff_10028b1d36_1
          state: "on"
        - condition: state
          entity_id: switch.irrigazione_sonoff_switch_4chpror3_sonoff_10028b1d36_2
          state: "on"
        - condition: state
          entity_id: switch.irrigazione_sonoff_switch_4chpror3_sonoff_10028b1d36_3
          state: "on"
  action:
    - action: counter.increment
      target:
        entity_id: counter.irrigazione_minuti_oggi

#==================================================================================
# 2. IRRIGAZIONE – RESET GESTIONE MANUALE A MEZZANOTTE
#==================================================================================
- id: irrigazione_reset_salta_mezzanotte
  alias: "Irrigazione - Reset salta-oggi a mezzanotte"
  mode: single
  triggers:
    - platform: time
      at: "23:59:00"
  condition: []
  action:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.irrigazione_salta_oggi

#==================================================================================
# 3. ALLERTA PANNELLO A 0 PER 1 ORA (SOLO DI GIORNO)
#==================================================================================
- id: tigo_alert_panel_zero_1h
  alias: "Tigo - Pannello a 0 per 1h (solo giorno)"
  mode: parallel
  triggers:
    - platform: state
      entity_id:
        - sensor.tetto_vs_ovest_panel_a1_power
        - sensor.tetto_vs_ovest_panel_a2_power
        - sensor.tetto_vs_ovest_panel_a3_power
        - sensor.tetto_vs_ovest_panel_a4_power
        - sensor.tetto_vs_ovest_panel_a5_power
        - sensor.tetto_vs_mare_panel_a6_power
        - sensor.tetto_vs_mare_panel_a7_power
        - sensor.tetto_vs_mare_panel_a8_power
        - sensor.tetto_vs_mare_panel_a9_power
        - sensor.tetto_vs_mare_panel_a10_power
        - sensor.sopra_pergola_panel_b1_power
        - sensor.sopra_pergola_panel_b2_power
        - sensor.sopra_pergola_panel_b3_power
        - sensor.sopra_pergola_panel_b4_power
        - sensor.sopra_pergola_panel_b5_power
        - sensor.sopra_tenda_giardino_panel_b6_power
        - sensor.sopra_tenda_giardino_panel_b7_power
        - sensor.sopra_tenda_giardino_panel_b8_power
        - sensor.sopra_tenda_giardino_panel_b9_power
        - sensor.sopra_pergola_panel_b10_power
        - sensor.sopra_tenda_giardino_panel_b11_power
      to: "0"
      for: "01:00:00"
  condition:
    - condition: state
      entity_id: sun.sun
      state: "above_horizon"
    - condition: template
      value_template: "{{ states(trigger.entity_id) | float(0) == 0 }}"
  action:
    - action: notify.mobile_app_cph2653
      data:
        title: "⚠️ Pannello a 0 da 1h"
        message: >-
          Pannello {{ trigger.entity_id.split('panel_')[1].split('_')[0] | upper }} = 0 W da almeno 1 ora.
        data:
          clickAction: "/casa-ginepro/home"
          priority: high
          ttl: 0
          persistent: "true"

