#==================================================================================
# 9. NOTIFICA CAMBIO STATO - PERSIANA GIARDINO (solo fuori casa)
#==================================================================================
- id: notifica_persiana_giardino
  alias: "Notifica - Persiana Giardino"
  mode: single
  triggers:
    - platform: state
      entity_id: binary_sensor.0xa4c1380640bfffff_contact
  condition:
    - condition: state
      entity_id: person.alex
      state: "not_home"
  action:
    - action: notify.mobile_app_cph2653
      data:
        title: "🪟 Persiana Giardino"
        message: "{{ 'APERTA' if states('binary_sensor.0xa4c1380640bfffff_contact') == 'on' else 'CHIUSA' }}"
        data:
          tag: "notifica_persiana_giardino"
          priority: high
          ttl: 0

