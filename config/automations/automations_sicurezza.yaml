#==================================================================================
# 4. TIMER SPEGNIMENTO LUCE (30s)
#==================================================================================
- id: spegni_luce_camera_dopo_30s
  alias: "Spegni luce camera dopo 30s"
  mode: restart
  triggers:
    - platform: state
      entity_id: light.179_camera_cancello_faretto
      to: "on"
  action:
    - delay: "00:00:30"
    - action: light.turn_off
      target:
        entity_id: light.179_camera_cancello_faretto
      data:
        transition: 1

#==================================================================================
# 5. ASCOLTO CLICK NOTIFICA - SIRENA ON
#==================================================================================
- id: gestione_click_sirena_notifica
  alias: "Gestione Click Sirena Notifica"
  mode: parallel
  triggers:
    - platform: event
      event_type: mobile_app_notification_action
      event_data:
        action: "ATTIVA_SIRENA"
  action:
    - action: script.turn_on
      target:
        entity_id: script.sirena_on

#==================================================================================
# 6. SPEGNIMENTO AUTOMATICO SIRENA (60s)
#==================================================================================
- id: spegni_sirena_automatico
  alias: "Spegni Sirena Automatico"
  mode: restart
  triggers:
    - platform: state
      entity_id: siren.179_camera_cancello_sirena
      to: "on"
  action:
    - delay: "00:01:00"
    - action: script.turn_on
      target:
        entity_id: script.sirena_off

