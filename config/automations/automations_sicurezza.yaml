# automations_sicurezza_14.yaml

#==================================================================================
# 1. ACCENSIONE LUCE (Faretto Intruso) - solo notte
#==================================================================================
- id: accensione_luce_intruso_immediata
  alias: "Luce Intruso Immediata"
  mode: restart
  triggers:
    - platform: state
      entity_id: binary_sensor.179_camera_cancello_persona
      to: "on"
  condition:
    - condition: state
      entity_id: sun.sun
      state: "below_horizon"
  action:
    - action: light.turn_on
      target:
        entity_id: light.179_camera_cancello_faretto
      data:
        brightness_pct: 60
        transition: 0.2
    - delay: "00:00:30"
    - action: light.turn_off
      target:
        entity_id: light.179_camera_cancello_faretto
      data:
        transition: 1

#==================================================================================
# 2. NOTIFICA PERSONA RILEVATA - CANCELLO (due fasi)
#==================================================================================
- id: notifica_intruso_cancello
  alias: "Notifica Intruso - Cancello"
  mode: single
  triggers:
    - platform: state
      entity_id: binary_sensor.179_camera_cancello_persona
      to: "on"
  condition:
    - condition: state
      entity_id: person.alex
      state: "not_home"
  action:
    - action: notify.mobile_app_cph2653
      data:
        title: "🚨 INTRUSO RILEVATO!"
        message: "SCONOSCIUTO AL CANCELLO."
        data:
          tag: "notifica_cancello"
          clickAction: "intent:#Intent;action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;package=com.mcu.reolink;component=com.mcu.reolink/com.android.bc.login.WelcomeActivity;end"
          priority: high
          ttl: 0
          sticky: "true"
          persistent: "true"
          actions:
            - action: "ATTIVA_SIRENA"
              title: "🚨 ACCENDI SIRENA"
    - delay: "00:00:02"
    - variables:
        ts: "{{ now().strftime('%Y%m%d%H%M%S') }}"
    - action: camera.snapshot
      target:
        entity_id: camera.179_camera_cancello_lente_scorrevole_0
      data:
        filename: /config/www/snapshot_cancello.jpg
    - action: notify.mobile_app_cph2653
      data:
        title: "🚨 INTRUSO RILEVATO!"
        message: "SCONOSCIUTO AL CANCELLO."
        data:
          tag: "notifica_cancello"
          image: "/local/snapshot_cancello.jpg?ts={{ ts }}"
          clickAction: "intent:#Intent;action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;package=com.mcu.reolink;component=com.mcu.reolink/com.android.bc.login.WelcomeActivity;end"
          priority: high
          ttl: 0
          sticky: "true"
          persistent: "true"
          actions:
            - action: "ATTIVA_SIRENA"
              title: "🚨 ACCENDI SIRENA"

