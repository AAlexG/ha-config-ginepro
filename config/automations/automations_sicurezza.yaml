#==================================================================================
# 11. CHIUSURA AUTOMATICA PORTONE BOX SE RIMANE APERTO > 10 MIN
#     Nota: sensore binary_sensor.portone_box_sensore_zigbee_contact ha logica
#     invertita -> stato "off" (chiuso) = portone APERTO, stato "on" (aperto) = portone CHIUSO
#==================================================================================
- id: chiusura_automatica_portone_box
  alias: "Chiusura Automatica Portone Box - Timeout 10 min"
  mode: restart
  triggers:
    - platform: state
      entity_id: binary_sensor.portone_box_sensore_zigbee_contact
      to: "off"
      for: "00:10:00"
  condition:
    - condition: state
      entity_id: binary_sensor.portone_box_sensore_zigbee_contact
      state: "off"
  action:
    - action: notify.mobile_app_cph2653
      data:
        title: "🚪 Portone Box"
        message: "Portone rimasto aperto da più di 10 minuti. Chiusura automatica in corso."
        data:
          tag: "notifica_portone_box_timeout"
          priority: high
          ttl: 0
    - action: button.press
      target:
        entity_id: button.portone_telecomando