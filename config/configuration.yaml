  # Con flag acceso restano ferme: pergola, tenda giardino, canto uccelli
  # (fancoil gia' coperti da clima_modalita = assenza).
  # Girano comunque: sicurezza, deumidificatori, irrigazione, antigelo, notifiche, sistema.
  # NOTA: niente "initial" di proposito - lo stato deve sopravvivere a un riavvio di HA in vacanza.
  vacanza:
