  bolletta_mese_sel:
    name: "Bolletta – Mese di riferimento"
    options:
      - "-- seleziona --"
      - "06/2025"
      - "07/2025"
      - "08/2025"
      - "09/2025"
      - "10/2025"
      - "11/2025"
      - "12/2025"
      - "01/2026"
      - "02/2026"
      - "03/2026"
      - "04/2026"
      - "05/2026"
    initial: "-- seleziona --"
    icon: mdi:calendar-month

input_text:
  # Messaggio mostrato in plancia (Casa Ginepro) con l'esito dell'ultima
  # valutazione irrigazione: motivi di blocco (pioggia, umidità, vento,
  # previsioni) oppure conferma di irrigazione permessa. Scritto dalle
  # ciclo programmato e dagli script irrigazione (cicla_ora, stop, salta_toggle).
  irrigazione_motivo_blocco:
    name: "Irrigazione – Motivo blocco"
    max: 255
    icon: mdi:sprinkler-variant

shell_command:
  avvia_vivino_proxy: "python3 /config/vivino_proxy.py &"
  # Chiama lo script Python che legge mese + valori bolletta dal DB HA,
  # inietta le statistiche mensili e ricalcola input_number.elettricita_prezzo_kwh
  # e input_number.gas_prezzo_mc.
  # Stdout = JSON letto da script.salva_bolletta (response_variable).
  # Log diagnostico su /config/bolletta_log.txt (scritto dallo script stesso).
  salva_bolletta: "python3 /config/salva_bolletta.py 2>> /config/bolletta_log.txt"
  calcola_totali_consumi: "python3 /config/totali_consumi.py 2>> /config/totali_consumi.log"
  calcola_pv_tabella: "python3 /config/pv_tabella_mensile.py > /config/pv_tabella_mensile.json 2>/config/pv_tabella_mensile.log"



