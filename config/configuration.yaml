          {% set ns = namespace(best_id='', best_val= 999999999) %}          {% for e in entities %}
            {% set v = states(e) | float(0) %}
            {% if v < ns.best_val %}
              {% set ns.best_val = v %}
              {% set ns.best_id = e %}
            {% endif %}
