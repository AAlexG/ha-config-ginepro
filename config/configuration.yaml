    entity_id: switch.camerageorgi_shelly_fancoil_georgi
    state: "on"
    type: time
    start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0).isoformat() }}"
    end: "{{ now().isoformat() }}"

  - platform: history_stats
    name: "Fancoil Georgi Durata Oggi"
    entity_id: switch.camerageorgi_shelly_fancoil_georgi_2
    state: "on"
    type: time
    start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0).isoformat() }}"
