            19:  'E19 – Anomalia nella fase riempimento impianto | Premere tasto R per 2 secondi',
            20:  'E20 – Sensore NTC di mandata guasto | Chiamare assistenza',
            28:  'E28 – Sensore NTC fumi guasto | Chiamare assistenza',
