            84:  'E84 – Problema comunicazione scheda/unità comando | Chiamare assistenza',
            85:  'E85 – Problema comunicazione scheda/unità comando | Chiamare assistenza',
            86:  'E86 – Problema comunicazione scheda/unità comando | Chiamare assistenza',
            87:  'E87 – Problema comunicazione scheda/unità comando | Chiamare assistenza',
            92:  'E92 – Anomalia fumi (probabile ricircolo fumi) | Chiamare assistenza',
            109: 'E109 – Presenza aria nel circuito caldaia | Chiamare assistenza',
