            125: 'E125 – Mancanza circolazione (intervento sicurezza) | Premere tasto R per 2 secondi',
            128: 'E128 – Perdita di fiamma | Premere tasto R per 2 secondi',
            129: 'E129 – Perdita di fiamma in accensione | Chiamare assistenza',
            130: 'E130 – Sovratemperatura sonda NTC fumi | Premere tasto R per 2 secondi',
            133: 'E133 – Mancata accensione (5 tentativi) | Premere tasto R per 2 secondi',
            134: 'E134 – Valvola gas bloccata | Premere tasto R per 2 secondi',
            135: 'E135 – Errore interno di scheda | Premere tasto R per 2 secondi',
            154: 'E154 – Test controllo sonda mandata/ritorno | Chiamare assistenza',
            160: 'E160 – Anomalia funzionamento ventilatore | Chiamare assistenza',
            178: 'E178 – Sovratemperatura su impianto bassa temperatura | Chiamare assistenza',
            270: 'E270 – Surriscaldamento scambiatore | Chiamare assistenza',
            317: 'E317 – Frequenza di alimentazione elettrica errata | Chiamare assistenza',
            321: 'E321 – Sensore NTC sanitario guasto | Chiamare assistenza',
            384: 'E384 – Fiamma parassita (anomalia interna) | Premere tasto R per 2 secondi',
            385: 'E385 – Tensione di alimentazione troppo bassa | Ripristino automatico >175V, se persiste chiamare assistenza',
            431: 'E431 – Sensore scambiatore guasto | Chiamare assistenza'
          } %}
          {% if code == -1 or states('sensor.opentherm_gateway_otgw_otgw_oemfaultcode') in ['unknown', 'unavailable'] %}
            Nessun fault
          {% elif code in faults %}
            {{ faults[code] }}
          {% else %}
            Codice sconosciuto ({{ code }})
          {% endif %}

#--- CONSUMO TOTALE DEUMIDIFICATORI: vedi blocco trigger-based a fine sezione template ---

#--- CONSUMO STIMATO FANCOIL A VELOCITA' MINIMA ---
# Stima basata su: ore di accensione oggi (history_stats) x potenza a velocità
# minima da datasheet ufficiale Daikin (catalogo Fan Coil Units 2026, pag. 25,
# tabella FWM-DAT/DAF).
# Tania/Georgi = taglia 03 (FWM03DATN6V3, targhetta confermata), Power input
# Low = 0.03 kW.
# Sala = taglia 06 (FWM06DATN6V3) NON CONFERMATA da targhetta, solo probabile.
# Power input Low taglia 06 = 0.05 kW: valore da aggiornare/rimuovere appena
# la targhetta di Sala viene letta.
# NOTA: è una stima al ribasso — se il fancoil lavora a velocità media/alta
# (selezionata dal termostato esterno), il consumo reale è più alto.
      - name: "Consumo Fancoil Tania Oggi Stimato"
        unique_id: "consumo_fancoil_tania_oggi_stimato"
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        icon: mdi:fan
        availability: "{{ has_value('sensor.fancoil_tania_durata_oggi') }}"
        state: >-
          {{ (states('sensor.fancoil_tania_durata_oggi') | float(0) * 0.03) | round(3) }}

      - name: "Consumo Fancoil Georgi Oggi Stimato"
        unique_id: "consumo_fancoil_georgi_oggi_stimato"
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        icon: mdi:fan
        availability: "{{ has_value('sensor.fancoil_georgi_durata_oggi') }}"
        state: >-
          {{ (states('sensor.fancoil_georgi_durata_oggi') | float(0) * 0.03) | round(3) }}

      - name: "Consumo Fancoil Sala Oggi Stimato"
        unique_id: "consumo_fancoil_sala_oggi_stimato"
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        icon: mdi:fan-alert
        availability: "{{ has_value('sensor.fancoil_sala_durata_oggi') }}"
        state: >-
          {{ (states('sensor.fancoil_sala_durata_oggi') | float(0) * 0.05) | round(3) }}

#--- SOMME MONOTONE (protezione anti-reset spurio) -------------------------
# Le somme di piu' sorgenti giornaliere possono CALARE se una sorgente riporta
# un valore stantio/azzerato pur restando disponibile (tipico del cloud eWeLink).
# HA interpreta ogni calo di un total_increasing come RESET del contatore e
# riparte sommando da capo l'intero valore corrente: 3 cali/giorno hanno gonfiato
# le statistiche deumidificatori fino a 821 kWh in un giorno (max reale 5.6 kWh).
# Soluzione: sensori trigger-based che trattengono il massimo raggiunto nella
# giornata (pavimento). Se una sorgente sparisce il totale resta fermo, non cala.
# Nei primi 10 minuti dopo la mezzanotte il pavimento e' disattivato, per lasciare
# passare il vero azzeramento giornaliero delle sorgenti.
  - triggers:
      - trigger: state
        entity_id:
          - sensor.deumidificatore_cantina_oggi
          - sensor.deumidificatore_armadio_sonoff_sonoff_1002a68db0_energy_day
      - trigger: time_pattern
        minutes: "/5"
      - trigger: homeassistant
        event: start
    sensor:
      - name: "Consumo Deumidificatori Oggi"
        unique_id: "consumo_deumidificatori_oggi"
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        icon: mdi:water-percent
        availability: >-
          {{ has_value('sensor.deumidificatore_cantina_oggi')
             and has_value('sensor.deumidificatore_armadio_sonoff_sonoff_1002a68db0_energy_day') }}
        state: >-
          {% set nuovo = (states('sensor.deumidificatore_cantina_oggi') | float(0) +
                          states('sensor.deumidificatore_armadio_sonoff_sonoff_1002a68db0_energy_day') | float(0))
                         | round(3) %}
          {% if now().hour == 0 and now().minute < 10 %}
            {{ nuovo }}
          {% else %}
            {{ [nuovo, this.state | float(0)] | max | round(3) }}
          {% endif %}

  - triggers:
      - trigger: state
        entity_id:
          - sensor.consumo_fancoil_tania_oggi_stimato
          - sensor.consumo_fancoil_georgi_oggi_stimato
          - sensor.consumo_fancoil_sala_oggi_stimato_non_verificato
      - trigger: time_pattern
        minutes: "/5"
      - trigger: homeassistant
        event: start
    sensor:
      - name: "Consumo Fancoil Totale Oggi"
        unique_id: "consumo_fancoil_totale_oggi"
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        icon: mdi:fan
        availability: >-
          {{ has_value('sensor.consumo_fancoil_tania_oggi_stimato')
             and has_value('sensor.consumo_fancoil_georgi_oggi_stimato')
             and has_value('sensor.consumo_fancoil_sala_oggi_stimato_non_verificato') }}
        state: >-
          {% set nuovo = (states('sensor.consumo_fancoil_tania_oggi_stimato') | float(0) +
                          states('sensor.consumo_fancoil_georgi_oggi_stimato') | float(0) +
                          states('sensor.consumo_fancoil_sala_oggi_stimato_non_verificato') | float(0))
                         | round(3) %}
          {% if now().hour == 0 and now().minute < 10 %}
            {{ nuovo }}
          {% else %}
            {{ [nuovo, this.state | float(0)] | max | round(3) }}
          {% endif %}

#--- LAVATRICE MIELE: sorgente sempre numerica ------------------------------
# sensor.lavatricemielewci870_consumo_energia va in 'unknown' quando la lavatrice
# e' spenta. Utility Meter eredita unita' e device_class dalla sorgente al primo
# stato valido: se al riavvio la sorgente e' unknown, i contatori restano senza
# kWh e senza device_class energy (quindi inutilizzabili nel cruscotto Energia).
# Questo wrapper trattiene l'ultimo valore noto quando la sorgente sparisce e
# dichiara unita' e device_class in modo esplicito. Gli azzeramenti di fine ciclo
# restano visibili e vengono gestiti normalmente da Utility Meter.
  - triggers:
      - trigger: state
        entity_id: sensor.lavatricemielewci870_consumo_energia
      - trigger: homeassistant
        event: start
    sensor:
      - name: "Lavatrice Energia"
        unique_id: "lavatrice_energia"
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        icon: mdi:washing-machine
        state: >-
          {% if has_value('sensor.lavatricemielewci870_consumo_energia') %}
            {{ states('sensor.lavatricemielewci870_consumo_energia') | float(0) | round(3) }}
          {% else %}
            {{ this.state | float(0) | round(3) }}
          {% endif %}

