  # --- LEAK DETECTOR: batteria binaria (0=OK, 1=Bassa) ---
  - sensor:
      - name: "Leak Detector Battery Status"
        unique_id: "leak_detector_battery_status"
        state: >-
          {{ 'OK' if states('sensor.hp1000se_pro_pro_v1_6_4_leak_detection_4_battery') | int(0) == 0 else 'Bassa' }}
        icon: >-
          {{ 'mdi:battery' if states('sensor.hp1000se_pro_pro_v1_6_4_leak_detection_4_battery') | int(0) == 0 else 'mdi:battery-alert' }}

  # --- IRRIGAZIONE: stato del programma automatico ---
  # salta_oggi OFF = programma attivo (parte agli orari O1/O2 se il meteo lo permette)
  # salta_oggi ON  = programma saltato per oggi (auto-ripristino a mezzanotte)
  - sensor:
      - name: "Irrigazione Attiva"
        unique_id: "irrigazione_attiva"
        state: >-
          {{ 'Saltata oggi' if is_state('input_boolean.irrigazione_salta_oggi', 'on') else 'Programmata' }}
        icon: >-
          {{ 'mdi:water-pump-off' if is_state('input_boolean.irrigazione_salta_oggi', 'on') else 'mdi:water-pump' }}

  - sensor:
      # ============================================================
      # SENSORI MENSILI – acc_corrente - inizio_mese
      # Robusti ai riavvii: input_number persiste, calcolo immediato
      # ============================================================
      - name: "Gas Mese MC"
        unique_id: "gas_mese_mc"
        state: >-
          {{ ([states('input_number.caldaia_gas_totale_acc') | float(0) -
               states('input_number.gas_inizio_mese') | float(0), 0] | max) | round(4) }}
        unit_of_measurement: "m³"
        state_class: measurement
        icon: mdi:meter-gas

      - name: "Elettricita Mese Euro"
        unique_id: "elettricita_mese_euro"
        # configuration_159: aggiunta quota fissa mensile (€/mese Eni,
        # indipendente dai giorni) per allineare il rilevato alla bolletta.
        state: >-
          {% set kwh = states('sensor.rete_energia_mese') | float(0) %}
          {% set fissa = states('input_number.elettricita_quota_fissa_mese') | float(0) %}
          {{ (kwh * states('input_number.elettricita_prezzo_kwh') | float(0) + fissa) | round(2) }}
        unit_of_measurement: "€"
        state_class: measurement
        icon: mdi:currency-eur

      - name: "Acqua Mese Euro"
        unique_id: "acqua_mese_euro"
        state: >-
          {{ ([states('input_number.acqua_costo_acc') | float(0) -
               states('input_number.acqua_costo_inizio_mese') | float(0), 0] | max) | round(2) }}
        unit_of_measurement: "€"
        state_class: measurement
        icon: mdi:currency-eur

      - name: "Acqua Mese MC"
        unique_id: "acqua_mese_mc"
        state: >-
          {{ ([states('input_number.acqua_consumo_acc') | float(0) -
               states('input_number.acqua_mc_inizio_mese') | float(0), 0] | max) | round(4) }}
        unit_of_measurement: "m³"
        state_class: measurement
        icon: mdi:water


  # --- CALDAIA OTGW: consumo gas stimato ---
  # Baxi Luna Duo-Tec IN+ 24 kW
  # Portata termica nominale riscaldamento: 20.6 kW
  # PCI metano: 9.59 kWh/m³
  # Consumo massimo: 20.6 / 9.59 = 2.148 m³/h
  # Modulazione 1:7 → minimo ~14.3% → 0.307 m³/h
  - sensor:
      - name: "Gas Oggi MC"
        unique_id: "gas_oggi_mc"
        state: >-
          {{ states('sensor.gas_caldaia_giornaliero') | float(0) | round(4) }}
        unit_of_measurement: "m³"
        state_class: measurement
        icon: mdi:meter-gas


      - name: "Gas Oggi Euro"
        unique_id: "gas_oggi_euro"
        state: >-
          {{ (states('sensor.gas_caldaia_giornaliero') | float(0) *
              states('input_number.gas_prezzo_mc') | float(0)) | round(2) }}
        unit_of_measurement: "€"
        state_class: measurement
        icon: mdi:currency-eur

      - name: "Gas Mese Euro"
        unique_id: "gas_mese_euro"
        # configuration_159: aggiunta quota fissa mensile (€/mese Eni,
        # indipendente dai giorni) per allineare il rilevato alla bolletta.
        state: >-
          {{ (states('sensor.gas_caldaia_mensile') | float(0) *
              states('input_number.gas_prezzo_mc') | float(0) +
              states('input_number.gas_quota_fissa_mese') | float(0)) | round(2) }}
        unit_of_measurement: "€"
        state_class: measurement
        icon: mdi:currency-eur

      - name: "Elettricita Oggi Euro"
        unique_id: "elettricita_oggi_euro"
        state: >-
          {% set grid = states('sensor.inverter_uflex_today_energy_import') | float(0) %}
          {% set prezzo = states('input_number.elettricita_prezzo_kwh') | float(0) %}
          {{ (grid * prezzo) | round(3) }}
        unit_of_measurement: "€"
        state_class: measurement
        icon: mdi:currency-eur

      - name: "Elettricita Oggi KWh"
        unique_id: "elettricita_oggi_kwh"
        state: >-
          {{ states('sensor.inverter_uflex_today_energy_import') | float(0) | round(2) }}
        unit_of_measurement: "kWh"
        state_class: measurement
        icon: mdi:transmission-tower

      - name: "Elettricita Mese KWh"
        unique_id: "elettricita_mese_kwh"
        state: >-
          {{ states('sensor.rete_energia_mese') | float(0) | round(2) }}
        unit_of_measurement: "kWh"
        state_class: measurement
        icon: mdi:transmission-tower

      # ============================================================
      # GSE: valore stimato vendita energia a rete (kWh × prezzo €/kWh)
      # Mostra quanto teoricamente varrebbe l'energia ceduta alla rete
      # al prezzo di acquisto corrente (input_number.elettricita_prezzo_kwh).
      # ============================================================
      - name: "A Rete Mese Euro"
        unique_id: "a_rete_mese_euro"
        state: >-
          {% set kwh = states('sensor.a_rete_mese') | float(0) %}
          {% set prezzo = states('input_number.elettricita_prezzo_kwh') | float(0) %}
          {{ (kwh * prezzo) | round(2) }}
        unit_of_measurement: "€"
        state_class: measurement
        icon: mdi:transmission-tower-export

      # NOTA: il sensore template "GSE Prezzo KWh" è stato RIMOSSO.
      # Il calcolo del prezzo €/kWh pagato dal GSE avviene ora in
      # salva_bolletta.py, che inietta le statistiche mensili sotto
      # lo statistic_id sensor.gse_prezzo_kwh (mese pagamento ÷ kWh
      # a rete di quel mese, da statistiche di sensor.a_rete_mese).
      # Il grafico "Prezzo GSE €/kWh" della dashboard continua a
      # leggere le stesse statistiche.

      # ============================================================
      # ELETTRICITA: prezzo marginale variabile ricostruito da PUN
      # (NUOVO – configuration_157)
      # Contratto Plenitude "Trend Casa Base Luce" (monorario,
      # indice PUN Index GME, aggiornamento mensile).
      # Formula quota energia da bolletta:
      #   Corrispettivo Luce Index x 1,1 (perdite)
      #   + Contributo al consumo 0,022 x 1,1
      #   + Dispacciamento 0,01752
      # Componenti marginali aggiuntive (bolletta apr-mag 2026):
      #   rete quota energia 0,01473
      #   oneri ASOS 0,028657 + ARIM 0,0016380
      #   accisa 0,0227
      # Il tutto x 1,10 (IVA 10%).
      # Il PUN Index GME mensile e' approssimato dalla media mensile
      # mono-oraria di sensor.pun_mono_orario (integrazione HACS
      # virtualdj/pun_sensor). Le costanti vanno riallineate quando
      # cambiano le condizioni economiche o le tariffe ARERA.
      # ============================================================
      - name: "Elettricita Prezzo KWh Variabile"
        unique_id: "elettricita_prezzo_kwh_variabile"
        unit_of_measurement: "€/kWh"
        state_class: measurement
        icon: mdi:currency-eur
        availability: >-
          {{ has_value('sensor.pun_mono_orario') }}
        state: >-
          {% set pun = states('sensor.pun_mono_orario') | float(0) %}
          {% set vendita = pun * 1.1 + 0.022 * 1.1 + 0.01752 %}
          {% set rete = 0.01473 %}
          {% set oneri = 0.028657 + 0.0016380 %}
          {% set accisa = 0.0227 %}
          {{ ((vendita + rete + oneri + accisa) * 1.10) | round(4) }}

  # ============================================================
  # CALDAIA: binary_sensor DHW effettivo (NUOVO – configuration_54)
  # ============================================================
  # PROBLEMA: binary_sensor.caldaia_opentherm_acqua_calda_2 è il bit
  # DHW-ENABLE della master-word OTGW, tenuto sempre ON dall'automation
  # otgw_dhw_override_on_avvio (dhw_override: 1).
  # Quindi history_stats su quel sensore contava ≈ 24h/giorno.
  #
  # SOLUZIONE: binary_sensor "proxy" che è ON solo quando:
  #   - fiamma accesa (binary_sensor.caldaia_opentherm_fiamma = on)
  #   - modulazione ≥ 80%
  # Per la Baxi Luna Duo-Tec IN+ 24 kW (combi senza serbatoio):
  #   * Acqua sanitaria: riscaldamento istantaneo a piena potenza → mod ~100%
  #   * Riscaldamento: SAT controlla temperatura di mandata bassa → mod <60%
  # Soglia 80% separa i due regimi con buona affidabilità.
  # Se la stima appare ancora troppo alta/bassa, aggiustare la soglia qui.
  # ============================================================
  # FV SURPLUS (NUOVO – configuration_161)
  # CT1 (sensor.inverter_uflex_external_ct1_power): positivo =
  # prelievo da rete, negativo = immissione (verificato sul campo).
  # Surplus = immissione oltre la soglia. delay_on/off contro il
  # flapping da passaggi nuvolosi.
  # ============================================================
  - binary_sensor:
      - name: "PV Surplus"
        unique_id: "pv_surplus"
        device_class: power
        icon: mdi:solar-power-variant
        delay_on: "00:02:00"
        delay_off: "00:05:00"
        availability: >-
          {{ has_value('sensor.inverter_uflex_external_ct1_power')
             and states('input_number.pv_surplus_soglia') | float(0) > 0 }}
        state: >-
          {{ states('sensor.inverter_uflex_external_ct1_power') | float(0)
             < -(states('input_number.pv_surplus_soglia') | float(0)) }}

  - binary_sensor:
      - name: "Caldaia DHW Attiva"
        unique_id: "caldaia_dhw_attiva"
        state: >-
          {{ is_state('binary_sensor.opentherm_gateway_otgw_otgw_flame', 'on') and
             states('sensor.opentherm_gateway_otgw_otgw_relative_modulation_level') | float(0) >= 80 }}
        device_class: heat
        icon: mdi:water-boiler

  # ============================================================
  # PORTONE BOX: sensore con logica invertita (configuration_128)
  # binary_sensor.portone_box_sensore_zigbee_contact:
  #   stato "off" (chiuso) = portone APERTO
  #   stato "on"  (aperto) = portone CHIUSO
  # Questo sensore proxy inverte la logica per mostrare correttamente
  # "Aperto"/"Chiuso" nelle plance (device_class garage_door: on=Aperto, off=Chiuso)
  # ============================================================
  - binary_sensor:
      - name: "Portone Box Stato"
        unique_id: "portone_box_stato_invertito"
        state: >-
          {{ is_state('binary_sensor.portone_box_sensore_zigbee_contact', 'off') }}
        device_class: garage_door
        icon: mdi:garage

  # ============================================================
  # ACQUA: sensori calcolati (NUOVO – configuration_53)
  # ============================================================
  # Soglie tariffarie ATO Genova 2025 (derive dalle bollette IRETI):
  #   2 residenti pro-die (mc/giorno):
  #   Agevolata  :  0 – 0.1765
  #   Base       :  0.1765 – 0.3333
  #   I° Eccedenza: 0.3333 – 0.5000
  #   II° Eccedenza: 0.5000 – 0.6471
  #   III° Eccedenza: > 0.6471
  # Flusso di default sanitaria calda: 8 L/min
  # C3 = ore_DHW × flusso_L_min × 0.06  (L/min × h × 60min/h / 1000 L/m³)
  - sensor:
      - name: "Acqua Irrigazione Oggi"
        unique_id: "acqua_irrigazione_oggi"
        # Consumo = minuti-canale erogati oggi × m³/min per canale.
        state: >-
          {% set minuti = states('counter.irrigazione_minuti_oggi') | int(0) %}
          {% set flusso = states('input_number.acqua_consumo_per_minuto') | float(0) %}
          {{ (minuti * flusso) | round(4) }}
        unit_of_measurement: "m³"
        state_class: measurement
        icon: mdi:sprinkler

      - name: "Caldaia DHW Durata Oggi Minuti"
        unique_id: "caldaia_dhw_durata_oggi_minuti"
        # Riscaldamento OFF (estate): legge input_number.caldaia_dhw_durata_acc,
        #   accumulato minuto per minuto dall'automazione caldaia_dhw_accumula_minuti
        #   quando binary_sensor.caldaia_opentherm_acqua_calda_2 è ON.
        # Riscaldamento ON (inverno): restituisce il valore fisso configurabile
        #   input_number.caldaia_dhw_durata_invernale (default 3 min).
        state: >-
          {% if is_state('climate.smart_autotune_thermostat_living_room', 'off') %}
            {{ states('input_number.caldaia_dhw_durata_acc') | float(0) | round(1) }}
          {% else %}
            {{ states('input_number.caldaia_dhw_durata_invernale') | float(3) | round(1) }}
          {% endif %}
        unit_of_measurement: "min"
        icon: mdi:clock-outline

      - name: "Acqua Sanitaria Calda Stimata"
        unique_id: "acqua_sanitaria_calda_stimata"
        state: >-
          {% set minuti = states('sensor.caldaia_dhw_durata_oggi_minuti') | float(0) %}
          {% set flusso = states('input_number.acqua_flusso_doccia') | float(8) %}
          {{ (minuti / 60 * flusso * 0.06) | round(4) }}
        unit_of_measurement: "m³"
        state_class: measurement
        icon: mdi:water-boiler

      - name: "Acqua Sanitaria Totale"
        unique_id: "acqua_sanitaria_totale"
        state: >-
          {% set C3 = states('sensor.acqua_sanitaria_calda_stimata') | float(0) %}
          {% set C4 = states('input_number.acqua_sanitaria_manuale') | float(0) %}
          {{ (C3 + C4) | round(4) }}
        unit_of_measurement: "m³"
        state_class: measurement
        icon: mdi:water

      - name: "Acqua Oggi MC"
        unique_id: "acqua_oggi_mc"
        state: >-
          {% set C2 = states('sensor.acqua_irrigazione_oggi') | float(0) %}
          {% set C5 = states('sensor.acqua_sanitaria_totale') | float(0) %}
          {{ (C2 + C5) | round(4) }}
        unit_of_measurement: "m³"
        state_class: measurement
        icon: mdi:water-check

      - name: "Acqua Oggi Euro"
        unique_id: "acqua_oggi_euro"
        state: >-
          {% set q = states('sensor.acqua_oggi_mc') | float(0) %}
          {% set tariffa = states('input_number.acqua_tariffa') | float(5.5) %}
          {{ (q * tariffa) | round(2) }}
        unit_of_measurement: "€"
        state_class: measurement
        icon: mdi:currency-eur


      - name: "Panasonic Energia Prodotta Acc Sensor"
        unique_id: "panasonic_energia_prodotta_acc_sensor"
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        icon: mdi:heat-pump
        availability: "{{ has_value('input_number.panasonic_energia_prodotta_acc') }}"
        state: "{{ states('input_number.panasonic_energia_prodotta_acc') | float(0) | round(4) }}"

      - name: "Panasonic Energia Consumata Acc Sensor"
        unique_id: "panasonic_energia_consumata_acc_sensor"
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        icon: mdi:lightning-bolt
        availability: "{{ has_value('input_number.panasonic_energia_consumata_acc') }}"
        state: "{{ states('input_number.panasonic_energia_consumata_acc') | float(0) | round(4) }}"

      - name: "Clima Media Esterna 7gg"
        unique_id: "clima_media_esterna_7gg"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        icon: mdi:thermometer
        state: >-
          {% set t = states('sensor.hp1000se_pro_pro_v1_6_4_outdoor_temperature') | float(15) %}
          {% set media = states('input_number.clima_media_esterna_7gg') | float(15) %}
          {{ (media * 0.979 + t * 0.021) | round(2) }}

#--- PANASONIC AQUAREA (TEMPLATE SENSORS) ---
  - sensor:
      # Potenza termica prodotta: calcolata da flow e delta T
      # Usa Main_Outlet_Temp (mandata) e Main_Inlet_Temp (ritorno)
      # Formula: flow (l/min) * delta_T (K) * 69.77 (W per l/min per K per acqua)
      - name: "Panasonic Potenza Prodotta Calcolata"
        unique_id: "panasonic_potenza_prodotta_calcolata"
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:heat-pump
        state: >-
          {% set flow = states('sensor.panasonic_heat_pump_main_pump_flow') | float(0) %}
          {% set t_out = states('sensor.panasonic_heat_pump_main_main_outlet_temp') | float(0) %}
          {% set t_in = states('sensor.panasonic_heat_pump_main_main_inlet_temp') | float(0) %}
          {% set delta = (t_in - t_out) | abs %}
          {% if flow > 0 and delta > 0.2 %}
            {{ (flow * delta * 69.77) | round(0) }}
          {% else %}
            0
          {% endif %}

      # Potenza elettrica consumata: stimata da corrente compressore
      # Formula: corrente * tensione (220V) * power factor (0.85)
      - name: "Panasonic Potenza Consumata Calcolata"
        unique_id: "panasonic_potenza_consumata_calcolata"
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:lightning-bolt
        state: >-
          {% set current = states('sensor.panasonic_heat_pump_main_compressor_current') | float(0) %}
          {% if current > 0 %}
            {{ (current * 220 * 0.85) | round(0) }}
          {% else %}
            0
          {% endif %}

      # ============================================================
      # GESTIONE CALDAIA/PDC (NUOVO – configuration_160)
      # Costo di 1 kWh termico per ciascuna fonte, a prezzi correnti.
      # Le quote fisse NON entrano nel confronto: si pagano comunque
      # con entrambe le fonti e si cancellano nella differenza.
      # ============================================================
      # Caldaia: prezzo gas a consumo / (11,0078 kWh/Smc × rendimento).
      # 11,0078 = PCS da bolletta 0,039628 GJ/Smc ÷ 0,0036 GJ/kWh.
      - name: "Caldaia Costo KWh Termico"
        unique_id: "caldaia_costo_kwh_termico"
        unit_of_measurement: "€/kWh"
        state_class: measurement
        icon: mdi:fire
        availability: >-
          {{ states('input_number.caldaia_rendimento') | float(0) > 0
             and states('input_number.gas_prezzo_mc') | float(0) > 0 }}
        state: >-
          {% set prezzo = states('input_number.gas_prezzo_mc') | float(0) %}
          {% set eta = states('input_number.caldaia_rendimento') | float(0) %}
          {{ (prezzo / (11.0078 * eta)) | round(4) }}

      # PdC: prezzo elettricità effettivo / COP. Usa il COP reale
      # quando la pompa lavora, altrimenti il COP di riserva.
      # configuration_161: con surplus FV (binary_sensor.pv_surplus on)
      # il prezzo effettivo è il mancato incasso GSE, non il P1.
      - name: "PdC Costo KWh Termico"
        unique_id: "pdc_costo_kwh_termico"
        unit_of_measurement: "€/kWh"
        state_class: measurement
        icon: mdi:heat-pump
        availability: >-
          {{ states('input_number.elettricita_prezzo_kwh') | float(0) > 0
             and (has_value('sensor.panasonic_cop_calcolato')
                  or states('input_number.pdc_cop_fallback') | float(0) > 0) }}
        state: >-
          {% set surplus = is_state('binary_sensor.pv_surplus', 'on') %}
          {% set gse = states('input_number.gse_prezzo_kwh_stima') | float(0) %}
          {% set p1 = states('input_number.elettricita_prezzo_kwh') | float(0) %}
          {% set prezzo = gse if (surplus and gse > 0) else p1 %}
          {% set cop_reale = states('sensor.panasonic_cop_calcolato') | float(0) %}
          {% set cop = cop_reale if cop_reale > 0.8
                       else states('input_number.pdc_cop_fallback') | float(0) %}
          {{ (prezzo / cop) | round(4) }}

      # Verdetto: fonte più conveniente adesso. Attributi con i due
      # costi e il risparmio %. Solo informativo: le automazioni di
      # controllo (con isteresi) arriveranno in un passo successivo.
      - name: "Riscaldamento Fonte Conveniente"
        unique_id: "riscaldamento_fonte_conveniente"
        icon: mdi:scale-balance
        availability: >-
          {{ has_value('sensor.pdc_costo_kwh_termico')
             and has_value('sensor.caldaia_costo_kwh_termico') }}
        state: >-
          {% set pdc = states('sensor.pdc_costo_kwh_termico') | float(0) %}
          {% set cal = states('sensor.caldaia_costo_kwh_termico') | float(0) %}
          {{ 'PdC' if pdc <= cal else 'Caldaia' }}
        attributes:
          surplus_pv: "{{ is_state('binary_sensor.pv_surplus', 'on') }}"
          pdc_eur_kwht: "{{ states('sensor.pdc_costo_kwh_termico') | float(0) }}"
          caldaia_eur_kwht: "{{ states('sensor.caldaia_costo_kwh_termico') | float(0) }}"
          risparmio_pct: >-
            {% set pdc = states('sensor.pdc_costo_kwh_termico') | float(0) %}
            {% set cal = states('sensor.caldaia_costo_kwh_termico') | float(0) %}
            {% if pdc > 0 and cal > 0 %}
              {{ ((1 - ([pdc, cal] | min) / ([pdc, cal] | max)) * 100) | round(1) }}
            {% else %} 0 {% endif %}

      # COP reale: potenza prodotta / potenza consumata
      - name: "Panasonic COP Calcolato"
        unique_id: "panasonic_cop_calcolato"
        state_class: measurement
        icon: mdi:chart-line
        availability: >-
          {% set flow = states('sensor.panasonic_heat_pump_main_pump_flow') | float(-1) %}
          {% set t_out = states('sensor.panasonic_heat_pump_main_main_outlet_temp') | float(-1) %}
          {% set t_in = states('sensor.panasonic_heat_pump_main_main_inlet_temp') | float(-1) %}
          {% set current = states('sensor.panasonic_heat_pump_main_compressor_current') | float(-1) %}
          {% set delta = (t_in - t_out) | abs %}
          {{ flow > 0 and delta > 0.2 and current > 0 and t_out >= 0 and t_in >= 0 }}
        state: >-
          {% set flow = states('sensor.panasonic_heat_pump_main_pump_flow') | float(0) %}
          {% set t_out = states('sensor.panasonic_heat_pump_main_main_outlet_temp') | float(0) %}
          {% set t_in = states('sensor.panasonic_heat_pump_main_main_inlet_temp') | float(0) %}
          {% set delta = (t_in - t_out) | abs %}
          {% set current = states('sensor.panasonic_heat_pump_main_compressor_current') | float(0) %}
          {% set prod = flow * delta * 69.77 %}
          {% set cons = current * 220 * 0.85 %}
          {{ (prod / cons) | round(2) }}

#--- OTGW – DESCRIZIONE FAULT BAXI LUNA DUO-TEC+ ---
      - name: "OTGW Baxi Fault Descrizione"
        unique_id: otgw_baxi_fault_descrizione
        icon: mdi:alert-circle-outline
        state: >
