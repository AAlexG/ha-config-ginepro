    max: 180
    step: 1
    unit_of_measurement: "min"
    mode: box
    icon: mdi:numeric-3-box

  # m³ al minuto PER SINGOLO CANALE (impostare 0.0333).
  # Consumo irrigazione = minuti-canale erogati oggi × questo valore.
  acqua_consumo_per_minuto:
    name: "Irrigazione – m³/min per canale"
    min: 0
    max: 1
    step: 0.0001
    unit_of_measurement: "m³/min"
    mode: box
    icon: mdi:water-pump

  acqua_flusso_doccia:
    name: "Acqua calda – Flusso sanitaria"
    min: 1
    max: 25
    step: 0.1
    unit_of_measurement: "L/min"
    mode: box
    icon: mdi:shower

  acqua_sanitaria_manuale:
    name: "Acqua sanitaria totale giorno (C4)"
    min: 0
    max: 20
    step: 0.001
    unit_of_measurement: "m³"
    mode: box
    icon: mdi:water-pump

  # Accumulatore costo acqua per storico mensile.
  # Inizializzato a 1068.71 (Ago'24–Dic'25) dall'automazione acqua_setup_iniziale
  # (solo al primo avvio, quando il valore è 0).
  # NON specificare initial: altrimenti si azzererebbe a ogni riavvio.
  acqua_costo_acc:
    name: "Acqua – Accumulatore costo (€)"
    min: 0
    max: 999999
    step: 0.01
    unit_of_measurement: "€"
    mode: box
    icon: mdi:currency-eur

  acqua_consumo_acc:
    name: "Acqua – Accumulatore consumo (m³)"
    min: 0
    max: 999999
    step: 0.0001
    unit_of_measurement: "m³"
    mode: box
    icon: mdi:water

  # ============================================================
  # INIZIO MESE – valori accumulatori al 1° del mese
  # Aggiornati dall'automation reset_inizio_mese ogni 1° del mese
  # ============================================================
  gas_inizio_mese:
    name: "Gas – Acc inizio mese (m³)"
    min: 0
    max: 999999
    step: 0.0001
    mode: box
    icon: mdi:meter-gas

  acqua_costo_inizio_mese:
    name: "Acqua – Costo acc inizio mese (€)"
    min: 0
    max: 999999
    step: 0.01
    mode: box
    icon: mdi:currency-eur

  acqua_mc_inizio_mese:
    name: "Acqua – m³ acc inizio mese"
    min: 0
    max: 999999
    step: 0.0001
    mode: box
    icon: mdi:water

  # ============================================================
  # CALDAIA DHW: durata sanitaria (NUOVO – configuration_70)
  # ============================================================
  # Durata fissa sanitaria in inverno (riscaldamento ON).
  # Quando climate è in modalità heat, sensor.caldaia_dhw_durata_oggi_minuti
  # restituisce sempre questo valore invece di accumulare minuto per minuto.
  caldaia_dhw_durata_invernale:
    name: "Durata caldaia x sanitaria al giorno in inverno"
    min: 0
    max: 60
    step: 0.5
    unit_of_measurement: "min"
    mode: slider
    icon: mdi:water-boiler-timer

  # Accumulatore minuti DHW giornalieri (solo estate, riscaldamento OFF).
  # Incrementato ogni minuto dall'automazione caldaia_dhw_accumula_minuti
  # quando binary_sensor.caldaia_opentherm_acqua_calda_2 è ON.
  # Azzerato ogni sera alle 23:00 da acqua_reset_mezzanotte.
  caldaia_dhw_durata_acc:
    name: "Accumulatore minuti DHW giornalieri"
    min: 0
    max: 1440
    step: 1
    unit_of_measurement: "min"
    mode: box
    icon: mdi:timer-sand

  # ============================================================
  # BOLLETTE: valori manuali da inserire a ogni nuova bolletta
  # Usati nei grafici mensili "bollette" (statistics-graph period:month stat_types:max).
  # Logica: si aggiorna il campo quando arriva la bolletta; il grafico
  # cattura il valore massimo del mese = il valore della bolletta.
  # ============================================================
  bolletta_gas_mc:
    name: "Gas – Bolletta mese (m³)"
    min: 0
    max: 9999
    step: 0.001
    unit_of_measurement: "m³"
    mode: box
    icon: mdi:meter-gas

  bolletta_gas_euro:
    name: "Gas – Bolletta mese (€)"
    min: 0
    max: 9999
    step: 0.01
    unit_of_measurement: "€"
    mode: box
    icon: mdi:currency-eur

  bolletta_elec_kwh:
    name: "Elettricità – Bolletta mese (kWh)"
    min: 0
    max: 99999
    step: 0.001
    unit_of_measurement: "kWh"
    mode: box
    icon: mdi:transmission-tower

  bolletta_elec_euro:
    name: "Elettricità – Bolletta mese (€)"
    min: 0
    max: 9999
    step: 0.01
    unit_of_measurement: "€"
    mode: box
    icon: mdi:currency-eur

  # Importo mensile pagato dal GSE per l'energia ceduta alla rete.
  # Da inserire manualmente quando arriva il bonifico GSE.
  # Storicizzato da salva_bolletta.py, che ricalcola anche il prezzo
  # €/kWh GSE per ogni mese (statistiche sensor.gse_prezzo_kwh).
  bolletta_gse_euro:
    name: "GSE – Pagato mese (€)"
    min: 0
    max: 9999
    step: 0.01
    unit_of_measurement: "€"
    mode: box
    icon: mdi:solar-power-variant

  acqua_tariffa:
    name: "Acqua – Tariffa omnicomprensiva €/m³"
    min: 0.01
    max: 20
    step: 0.01
    unit_of_measurement: "€/m³"
    mode: box
    icon: mdi:currency-eur

  bolletta_acqua_mc:
    name: "Acqua – Bolletta (m³)"
    min: 0
    max: 9999
    step: 0.001
    unit_of_measurement: "m³"
    mode: box
    icon: mdi:water

  bolletta_acqua_euro:
    name: "Acqua – Bolletta (€)"
    min: 0
    max: 9999
    step: 0.01
    unit_of_measurement: "€"
    mode: box
    icon: mdi:currency-eur

  # ============================================================
  # FOTOVOLTAICO – risparmio storico (aggiornati da totali_consumi.py)
  # ============================================================
  pv_risparmio_euro:
    name: "FV – Risparmio autoconsumo (€)"
    min: 0
    max: 99999
    step: 0.01
    unit_of_measurement: "€"
    mode: box
    icon: mdi:solar-power

  pv_gse_euro:
    name: "FV – Pagamenti GSE (€)"
    min: 0
    max: 99999
    step: 0.01
    unit_of_measurement: "€"
    mode: box
    icon: mdi:cash-multiple

  pv_totale_euro:
    name: "FV – Risparmio totale (€)"
    min: 0
    max: 99999
    step: 0.01
    unit_of_measurement: "€"
    mode: box
    icon: mdi:piggy-bank

  pv_recupero_pct:
    name: "FV – Recupero investimento (%)"
    min: 0
    max: 100
    step: 0.01
    unit_of_measurement: "%"
    mode: box
    icon: mdi:percent

# NUOVA SEZIONE (configuration_162): richiede riavvio COMPLETO no,
# RAPIDO (solo HA) essendo nuova integrazione top-level.
input_datetime:
  fonte_ultima_commutazione:
    name: "Fonte – Ultima commutazione"
    has_date: true
    has_time: true
    icon: mdi:history

  # Orari del programma irrigazione (modificabili da plancia). Solo ora, niente data.
  # initial: valore di partenza se manca il restore_state (evita stato unavailable,
  # che bloccherebbe silenziosamente i trigger del ciclo programmato).
  irrigazione_ora_mattino:
    name: "Irrigazione - Ora mattino (O1)"
    has_date: false
    has_time: true
    initial: "08:25:00"
    icon: mdi:weather-sunset-up
  irrigazione_ora_sera:
    name: "Irrigazione - Ora sera (O2)"
    has_date: false
    has_time: true
    initial: "20:25:00"
    icon: mdi:weather-sunset-down

input_select:
  # --- MODALITÀ CLIMA ---
  clima_modalita:
    name: "Clima Modalità"
    options:
      - "giorno"
      - "notte"
      - "assenza"
      - "manuale"
      - "comfort"
      - "eco"
    icon: mdi:home-thermometer

  clima_stagione:
    name: "Clima Stagione"
    options:
      - "estate"
      - "inverno"
    icon: mdi:weather-sunny

  # Mese di riferimento per inserimento bollette.
