# configuration_167.yaml
default_config:

#==================================================================================
# RECORDER - Esclusioni entità ad alta frequenza per contenere il database
# Escluse solo dallo storico dettagliato: automazioni, statistiche a lungo
# termine, dashboard Energia e tabella FV mensile NON sono influenzate.
#==================================================================================
recorder:
  purge_keep_days: 7
  exclude:
    entities:
      - binary_sensor.inverter_uflex_connection
      - sensor.inverter_uflex_update_interval
    entity_globs:
      - sensor.panasonic_heat_pump_stats_*
      - sensor.inverter_uflex_*_l1_*
      - sensor.inverter_uflex_*_current
      - sensor.inverter_uflex_external_ct1_*

homeassistant:
  allowlist_external_dirs:
    - /sys
    - /config

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.30.33.0/24
    - 127.0.0.1

frontend:
  themes: !include_dir_merge_named themes

automation: !include_dir_merge_list automations/
script: !include scripts.yaml
scene: !include scenes.yaml

logger:
  default: warning

#--- MONITORAGGIO HARDWARE ---
command_line:
  - sensor:
      name: RPi CPU Temperature
      command: "cat /sys/class/thermal/thermal_zone0/temp"
      unit_of_measurement: "°C"
      icon: mdi:thermometer
      scan_interval: 30
      value_template: "{{ (value | int / 1000) | round(1) }}"

  - sensor:
      name: RPi Fan Speed
      command: "cat /sys/class/hwmon/hwmon*/fan1_input 2>/dev/null | head -1 || echo '0'"
      unit_of_measurement: "RPM"
      icon: mdi:fan
      scan_interval: 15
      value_template: "{{ value | int(0) }}"

  - sensor:
      name: PV Tabella Mensile
      unique_id: pv_tabella_mensile
      command: "cat /config/pv_tabella_mensile.json 2>/dev/null"
      scan_interval: 3600
      value_template: "{{ value_json.mesi | length }}"
      json_attributes:
        - mesi
  - sensor:
      name: "Ultima Modifica Configurazione"
      command: "find . -maxdepth 2 -name '*.yaml' -exec stat -c '%Y' {} + | sort -n | tail -1"
      scan_interval: 120
      value_template: "{{ value | int }}"
      

#--- TIGO / PANNELLI (TEMPLATE SENSOR) ---
template:
