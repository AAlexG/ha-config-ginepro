      - name: "Panel Max Power Summary"
        unique_id: "panel_max_power_summary"
        state: >-
          {% set entities = ['sensor.panel_a1_power', 'sensor.panel_a2_power', 'sensor.panel_a3_power', 'sensor.panel_a4_power', 'sensor.panel_a5_power', 'sensor.panel_a6_power', 'sensor.panel_a7_power', 'sensor.panel_a8_power', 'sensor.panel_a9_power', 'sensor.panel_a10_power', 'sensor.panel_b1_power', 'sensor.panel_b2_power', 'sensor.panel_b3_power', 'sensor.panel_b4_power', 'sensor.panel_b5_power', 'sensor.panel_b6_power', 'sensor.panel_b7_power', 'sensor.panel_b8_power', 'sensor.panel_b9_power', 'sensor.panel_b10_power', 'sensor.panel_b11_power'] %}
          {% set ns = namespace(best_id='', best_val= -999999) %}          {% for e in entities %}
            {% set v = states(e) | float(0) %}
            {% if v > ns.best_val %}
              {% set ns.best_val = v %}
              {% set ns.best_id = e %}
            {% endif %}
          {% endfor %}
          {% if ns.best_id == '' %}
            unknown
          {% else %}
            {{ ns.best_id.split('.')[1].split('_')[1] | upper }} = {{ ns.best_val | round(1) }} W
          {% endif %}

      - name: "Panel Min Power Summary"
