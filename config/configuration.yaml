    name: "Clima Autotuning Attivo"
    initial: false
    icon: mdi:tune-vertical

  # --- GESTIONE MANUALE FANCOIL E DEUMIDIFICATORE ---
  # Si attivano quando l'utente tocca lo switch a mano (toggle plancia o app Shelly).
  # Bloccano le automazioni di controllo fino al prossimo cambio giorno/notte (07:00/23:00).
  fancoil_georgi_manuale:
    name: "Fancoil Georgi - Gestione Manuale"
    initial: false
    icon: mdi:hand-back-right

  fancoil_georgi2_manuale:
    name: "Fancoil Georgi 2 - Gestione Manuale"
    initial: false
    icon: mdi:hand-back-right

  fancoil_sala_manuale:
    name: "Fancoil Sala - Gestione Manuale"
    initial: false
    icon: mdi:hand-back-right

  deumidificatore_cantina_manuale:
    name: "Deumidificatore Cantina - Gestione Manuale"
    initial: false
    icon: mdi:hand-back-right

  deumidificatore_armadio_manuale:
    name: "Deumidificatore Armadio - Gestione Manuale"
    initial: false
    icon: mdi:hand-back-right

  # --- GESTIONE MANUALE PERGOLA ---
  # Si attiva quando l'utente tocca il toggle manuale in plancia (script.pergola_toggle_manuale).
  # Blocca l'inseguimento solare e la sicurezza meteo fino al prossimo cambio giorno/notte (07:00/23:00).
  pergola_blocco_manuale:
    name: "Pergola - Gestione Manuale"
    initial: false
    icon: mdi:hand-back-left

  # Si attiva quando l'automazione pergola_meteo_chiusura chiude per vento/pioggia/scarsa radiazione.
