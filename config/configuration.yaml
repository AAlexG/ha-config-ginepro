  # Durata giornaliera DHW caldaia (per stima consumo acqua calda)
  # Usa binary_sensor.caldaia_dhw_attiva (fiamma + mod≥80%) invece di
  # acqua_calda_2 che è sempre ON per via del dhw_override: 1
  - platform: history_stats
    name: "Caldaia DHW Durata Oggi"
    entity_id: binary_sensor.caldaia_dhw_attiva
    state: "on"
    type: time
    start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0).isoformat() }}"
    end: "{{ now().isoformat() }}"

  # Durata giornaliera accensione fancoil (per stima consumo energetico
  # a velocità minima, moltiplicando le ore per la potenza da targhetta)
  - platform: history_stats
