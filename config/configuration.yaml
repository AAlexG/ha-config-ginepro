input_boolean:
  # --- GESTIONE FONTE CALDAIA/PDC (configuration_162) ---
  fonte_auto_attiva:
    name: "Fonte – Gestione automatica"
    icon: mdi:swap-horizontal-circle

  # --- SISTEMA CLIMA ---
  clima_pid_attivo:
