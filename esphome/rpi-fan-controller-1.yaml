# rpi-fan-controller-2.yaml
esphome:
  name: rpi-fan-controller
  friendly_name: RPI Fan controller
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-c3-devkitm-1
  variant: ESP32C3
  framework:
    type: arduino

logger:

api:
  encryption:
    key: !secret esphome_api_key

ota:
  - platform: esphome
    password: !secret esphome_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.1.39
    gateway: 192.168.1.1
    subnet: 255.255.255.0
    dns1: 192.168.1.1
  ap:
    ssid: "Rpi-Fan-Controller"
    password: !secret esphome_ap_password

captive_portal:

output:
  - platform: ledc
    pin: GPIO3
    id: fan_pwm
    frequency: 25000 Hz
    min_power: 0.13
    max_power: 1.0

fan:
  - platform: speed
    output: fan_pwm
    name: "Ventilatore Argon"
    id: argon_fan
    speed_count: 10

sensor:
  - platform: pulse_counter
    pin:
      number: GPIO10
      mode:
        input: true
        pullup: true
    name: "RPM Ventilatore"
    unit_of_measurement: "RPM"
    id: fan_rpm
    update_interval: 10s
    count_mode:
      rising_edge: DISABLE
      falling_edge: INCREMENT
    filters:
      - multiply: 0.5
